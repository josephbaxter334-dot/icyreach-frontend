<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IcyReach CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;--bg2:#0f1320;--bg3:#151b2e;--bg4:#1c2338;
  --border:#ffffff14;--border2:#ffffff22;
  --text:#e8eaf0;--text2:#8b93a8;--text3:#525d75;
  --accent:#4f8ef7;--accent2:#3d7ef5;--accent-dim:#4f8ef718;
  --green:#2dd98b;--green-dim:#2dd98b18;
  --amber:#f5a623;--amber-dim:#f5a62318;
  --red:#f05656;--red-dim:#f0565618;
  --purple:#a78bfa;--purple-dim:#a78bfa18;
  --radius:8px;--radius2:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px}
/* AUTH */
#auth-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .ico{font-size:42px;margin-bottom:10px}
.auth-logo h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:700}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:5px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg3);border-radius:10px;padding:4px}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.15s}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.msg.err{background:var(--red-dim);border:1px solid var(--red);color:var(--red)}
.msg.ok{background:var(--green-dim);border:1px solid var(--green);color:var(--green)}
/* APP */
#app-wrap{display:none;width:100%;height:100%}
#app{display:flex;width:100%;height:100%}
aside{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3)}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.ns{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 8px 6px;font-weight:500}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent)}
.ni .ic{font-size:15px;width:18px;text-align:center}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.aside-bot{padding:12px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:8px}
.uav{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.uemail{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;min-height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.topbar h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;flex:1}
.page{flex:1;overflow-y:auto;padding:24px}
/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--bg3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent2);color:#fff}
.btn.primary:hover:not(:disabled){background:var(--accent2)}
.btn.danger{color:var(--red);border-color:var(--red-dim)}
.btn.success{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:5px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:16px}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:500}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tag.green{background:var(--green-dim);color:var(--green)}
.tag.red{background:var(--red-dim);color:var(--red)}
.tag.amber{background:var(--amber-dim);color:var(--amber)}
.tag.blue{background:var(--accent-dim);color:var(--accent)}
.tag.purple{background:var(--purple-dim);color:var(--purple)}
.tag.gray{background:var(--bg4);color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius2);border:1px solid var(--border)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-size:13px;font-family:inherit;width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg3)}
label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fr{margin-bottom:14px}
.fr.row{display:flex;gap:12px}
.fr.row>*{flex:1}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pbw{background:var(--bg4);border-radius:20px;height:6px;overflow:hidden}
.pb{height:6px;border-radius:20px;background:var(--accent)}
.pb.green{background:var(--green)}.pb.amber{background:var(--amber)}.pb.red{background:var(--red)}
.modal-bg{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:680px}
.modal-hdr{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.xbtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.xbtn:hover{color:var(--text)}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;animation:tin .25s ease;display:flex;align-items:center;gap:10px;min-width:260px;max-width:380px}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--accent);color:var(--accent)}
@keyframes tin{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.thinking{display:inline-flex;align-items:center;gap:5px;color:var(--accent);font-size:12px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ep{background:var(--bg4);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text2);font-family:'DM Mono',monospace;max-height:300px;overflow-y:auto;border:1px solid var(--border)}
.tb{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.tb .search{flex:1;min-width:180px;max-width:280px}
.vc{display:inline-block;padding:1px 7px;background:var(--accent-dim);color:var(--accent);border-radius:4px;font-size:11px;cursor:pointer;margin:2px;font-family:'DM Mono',monospace}
.vc:hover{background:var(--accent);color:#fff}
.sw{position:relative;width:38px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-sl{position:absolute;inset:0;background:var(--bg4);border-radius:20px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.sw input:checked+.sw-sl{background:var(--accent);border-color:var(--accent2)}
.sw-sl:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sw-sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .ei{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:15px;color:var(--text2);margin-bottom:8px}
.seq-node{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.seq-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.seq-ico.mail{background:var(--accent-dim);color:var(--accent)}
.seq-ico.wait{background:var(--amber-dim);color:var(--amber)}
.seq-ico.cond{background:var(--purple-dim);color:var(--purple)}
.seq-ico.stop{background:var(--red-dim);color:var(--red)}
.seq-line{width:2px;height:14px;background:var(--border2);margin-left:15px;margin-bottom:4px}
.wf-step{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.wf-num{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.key-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.key-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inbox-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.inbox-item:hover{background:var(--bg3)}
.iav{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.banner{padding:14px 18px;border-radius:var(--radius2);font-size:13px;line-height:1.7;margin-bottom:20px;border:1px solid}
.banner.info{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
.banner.warn{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scout Chat */
.scout-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px - 48px);max-height:800px}
.scout-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.scout-bubble{max-width:80%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.7}
.scout-bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.scout-bubble.scout{background:var(--bg3);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.scout-bubble.scout strong{color:var(--accent)}
.scout-input-wrap{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg2)}
.scout-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;min-height:44px;max-height:120px}
.scout-input:focus{outline:none;border-color:var(--accent)}
.scout-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="ico">❄️</div><h1>IcyReach</h1><p>Cold Email CRM — Free & Unlimited</p></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="authTab('login')">Sign In</div>
      <div class="auth-tab" onclick="authTab('signup')">Create Account</div>
    </div>
    <div id="auth-msg"></div>
    <div id="login-form">
      <div class="fr"><label>Email</label><input id="l-email" type="email" placeholder="you@gmail.com" onkeydown="if(event.key==='Enter')login()"/></div>
      <div class="fr"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:11px;margin-top:4px" onclick="login()" id="l-btn">Sign In →</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="fr"><label>Email</label><input id="s-email" type="email" placeholder="you@gmail.com"/></div>
      <div class="fr"><label>Password</label><input id="s-pass" type="password" placeholder="Min 6 characters"/></div>
      <div class="fr"><label>Confirm Password</label><input id="s-pass2" type="password" onkeydown="if(event.key==='Enter')signup()"/></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:11px;margin-top:4px" onclick="signup()" id="s-btn">Create Account →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-wrap">
<div id="app">
  <aside>
    <div class="logo"><div class="logo-icon">❄️</div><div><div class="logo-text">IcyReach</div><div class="logo-sub">Cloud CRM</div></div></div>
    <nav>
      <div class="ns">Main</div>
      <div class="ni active" onclick="go('dashboard')"><span class="ic">📊</span>Dashboard</div>
      <div class="ni" onclick="go('campaigns')"><span class="ic">🚀</span>Campaigns<span class="nbadge" id="nb-c">0</span></div>
      <div class="ni" onclick="go('prospects')"><span class="ic">👥</span>Prospects<span class="nbadge" id="nb-p">0</span></div>
      <div class="ns">Tools</div>
      <div class="ni" onclick="go('analytics')"><span class="ic">📈</span>Analytics</div>
      <div class="ni" onclick="go('workflows')"><span class="ic">⚡</span>Workflows</div>
      <div class="ni" onclick="go('templates')"><span class="ic">✉️</span>Templates</div>
      <div class="ni" onclick="go('inbox')"><span class="ic">📥</span>Inbox<span class="nbadge" id="nb-i" style="background:var(--green)">0</span></div>
      <div class="ni" onclick="go('scout')"><span class="ic">🤖</span>Scout AI</div>
      <div class="ns">Settings</div>

      <div class="ni" onclick="go('accounts')"><span class="ic">📬</span>Email Accounts</div>
      <div class="ni" onclick="go('apikeys')"><span class="ic">🔑</span>API Keys</div>
      <div class="ni" onclick="go('settings')"><span class="ic">⚙️</span>Settings</div>
    </nav>
    <div class="aside-bot">
      <div style="text-align:center;margin-bottom:8px"><span id="plan-badge" class="tag gray" style="font-size:10px;text-transform:uppercase;letter-spacing:.08em">Free</span></div>
      <div class="user-row"><div class="uav" id="uav">?</div><div class="uemail" id="uemail">...</div></div>
      <button class="btn sm danger" style="width:100%;justify-content:center" onclick="logout()">Sign Out</button>
    </div>
  </aside>
  <main>
    <div class="topbar"><h1 id="page-title">Dashboard</h1><div id="topbar-actions" style="display:flex;gap:8px"></div></div>
    <div class="page" id="page-content"></div>
  </main>
</div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div id="modal"></div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL='https://fbmsfqzazwvsqndnzler.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNmcXphend2c3FuZG56bGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjUyMDksImV4cCI6MjA5NDM0MTIwOX0.dQrsrgi8W41v13egDzPrcqKoD7LRug0gEjqKGFzitBs';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let U=null,currentPage='dashboard';
let USER_PLAN={plan:'free',limits:{accounts:1,emails_per_month:500,campaigns:1,ai:false,scout:false,ab_testing:false,team_seats:1}};
const OWNER_EMAIL='josephbaxter334@gmail.com'; // Change to your email

const PLAN_LIMITS={
  free:{accounts:1,emails_per_month:500,campaigns:1,ai:false,scout:false,ab_testing:false,team_seats:1},
  cold:{accounts:5,emails_per_month:10000,campaigns:-1,ai:true,scout:true,ab_testing:false,team_seats:1},
  blizzard:{accounts:-1,emails_per_month:-1,campaigns:-1,ai:true,scout:true,ab_testing:true,team_seats:3},
  arctic:{accounts:-1,emails_per_month:-1,campaigns:-1,ai:true,scout:true,ab_testing:true,team_seats:10}
};

async function loadUserPlan(){
  if(!U)return;
  // Owner gets everything free
  const OWNER_EMAILS=['josephbaxter334@gmail.com','josephbaxter334@googlemail.com'];
  if(OWNER_EMAILS.includes(U.email?.toLowerCase())){
    USER_PLAN={plan:'owner',limits:{accounts:-1,emails_per_month:-1,campaigns:-1,ai:true,scout:true,ab_testing:true,team_seats:-1}};
    const badge=document.getElementById('plan-badge');
    if(badge){badge.className='tag amber';badge.textContent='Owner ⭐';}
    return;
  }
  try{
    // First check Supabase for existing plan
    const{data:existing}=await sb.from('user_plans').select('plan').eq('id',U.id).maybeSingle();
    if(existing?.plan&&existing.plan!=='free'){
      USER_PLAN={plan:existing.plan,limits:PLAN_LIMITS[existing.plan]||PLAN_LIMITS.free};
    } else {
      // Check Stripe by email — catches people who paid before signing up
      const backend=await getBackend();
      if(backend){
        try{
          const r=await fetch(backend+'/check-email-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:U.email,userId:U.id})});
          const d=await r.json();
          const plan=d.plan||'free';
          USER_PLAN={plan,limits:PLAN_LIMITS[plan]||PLAN_LIMITS.free};
        }catch(e){
          USER_PLAN={plan:'free',limits:PLAN_LIMITS.free};
        }
      }
    }
  }catch(e){
    USER_PLAN={plan:'free',limits:PLAN_LIMITS.free};
  }
  // Update plan badge in sidebar
  const badge=document.getElementById('plan-badge');
  if(badge){
    const colors={free:'gray',cold:'blue',blizzard:'green',arctic:'purple',owner:'amber'};
    const labels={free:'Free',cold:'Cold',blizzard:'Blizzard',arctic:'Arctic',owner:'Owner ⭐'};
    badge.className=`tag ${colors[USER_PLAN.plan]||'gray'}`;
    badge.textContent=labels[USER_PLAN.plan]||USER_PLAN.plan;
  }
}

function isPlanOk(feature){
  if(USER_PLAN.plan==='owner')return true;
  return USER_PLAN.limits[feature]===true||USER_PLAN.limits[feature]===-1||(typeof USER_PLAN.limits[feature]==='number'&&USER_PLAN.limits[feature]>0);
}

function planGate(feature,limitType){

async function login(){

  const btn=document.getElementById('l-btn');btn.disabled=true;btn.innerHTML='Signing in... <div class="spinner"></div>';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});

async function signup(){
  const email=document.getElementById('s-email').value.trim(),pass=document.getElementById('s-pass').value,pass2=document.getElementById('s-pass2').value;
  if(!email||!pass){authMsg('Fill all fields','err');return;}
  if(pass!==pass2){authMsg('Passwords do not match','err');return;}
  if(pass.length<6){authMsg('Password must be 6+ characters','err');return;}
  const btn=document.getElementById('s-btn');btn.disabled=true;btn.innerHTML='Creating... <div class="spinner"></div>';
  const{data,error}=await sb.auth.signUp({email,password:pass});
  btn.disabled=false;btn.innerHTML='Create Account →';
  if(error){authMsg(error.message,'err');return;}

async function onLogin(user){
  U=user;
  document.getElementById('auth-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  document.getElementById('uemail').textContent=user.email;
  document.getElementById('uav').textContent=(user.email||'?')[0].toUpperCase();
  await sb.from('settings').upsert({id:user.id},{onConflict:'id',ignoreDuplicates:true});
  const{data:tmpl}=await sb.from('templates').select('id').eq('user_id',user.id).limit(1);
  if(!tmpl?.length)await seedTemplates();
  // Load user plan
  await loadUserPlan();

  // Check for OAuth callback params
  const urlParams=new URLSearchParams(window.location.search);
  if(urlParams.get('oauth_success')){
    const provider=urlParams.get('oauth_success');
    const email=urlParams.get('email')||'';
    toast('✅ '+provider.charAt(0).toUpperCase()+provider.slice(1)+' account connected: '+email,'success');
    window.history.replaceState({},'',window.location.pathname);
    go('accounts');
  } else if(urlParams.get('oauth_error')){
    toast('❌ OAuth error: '+urlParams.get('oauth_error'),'error');
    window.history.replaceState({},'',window.location.pathname);
    go('accounts');
  } else {
    go('dashboard');
  }
}

function getWarmupPct(account){
  if(!account.warmup_start_date)return 0;
  const start=new Date(account.warmup_start_date);
  const days=Math.floor((Date.now()-start)/86400000);
  return Math.min(100,Math.round((days/35)*100));
}
function getWarmupStatus(account){
  if(!account.warmup_start_date)return 'Starting...';
  const start=new Date(account.warmup_start_date);
  const days=Math.floor((Date.now()-start)/86400000);
  const week=Math.floor(days/7)+1;
  if(days>=35)return '✅ Fully warmed up!';
  const limits={1:20,2:40,3:60,4:80,5:100};
  const currentLimit=limits[Math.min(week,5)]||100;
  const daysLeft=35-days;
  return `Week ${Math.min(week,5)} — ${currentLimit}/day — ${daysLeft} days to full warmup`;
}

async function bestAccount(){
  const{data:accs}=await sb.from('email_accounts').select('*').eq('user_id',U.id).eq('status','active');
  if(!accs?.length)return null;
  const avail=accs.filter(a=>(a.sent_today||0)<a.daily_limit);

  avail.sort((a,b)=>(b.daily_limit-(b.sent_today||0))-(a.daily_limit-(a.sent_today||0)));
  return avail[0].id;
}

async function doUpload(){
  const file=document.getElementById('uf').files[0];
  const cid=document.getElementById('uc').value;
  if(!file){toast('Select a file','error');return;}
  const btn=event.target;btn.disabled=true;btn.innerHTML='Importing... <div class="spinner"></div>';
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      let rows=[];
      if(file.name.endsWith('.csv')){
        const lines=e.target.result.split('\n').filter(l=>l.trim());
        const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
        rows=lines.slice(1).map(line=>{const cols=line.split(',');const obj={};headers.forEach((h,i)=>obj[h]=(cols[i]||'').trim());return obj;});
      }else{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{defval:''}).map(r=>{const obj={};Object.keys(r).forEach(k=>obj[k.toLowerCase().replace(/[^a-z0-9]/g,'')]=String(r[k]).trim());return obj;});
      }
      const accountId=await bestAccount();
      const{data:existing}=await sb.from('prospects').select('email').eq('user_id',U.id);
      const ex=new Set((existing||[]).map(p=>p.email));
      const ins=[];
      // Use current campaign filter if no campaign explicitly selected in modal
      const effectiveCid=cid||currentCampaignFilter||null;
      rows.forEach(r=>{
        const email=r.email||r.emailaddress||r.emailaddr||'';
        if(!email||ex.has(email))return;
        ins.push({user_id:U.id,campaign_id:effectiveCid,assigned_account_id:accountId,first_name:r.firstname||r.first||r.fname||'',last_name:r.lastname||r.last||r.lname||'',email,company:r.company||r.companyname||'',website:r.website||r.websiteurl||r.url||'',phone:r.phone||'',industry:r.industry||'',location:r.location||r.city||'',gbp_url:r.googlebusiness||r.gbp||r.gbpurl||'',status:'not started',research_status:'pending'});
        ex.add(email);
      });
      // Auto-approve if campaign is active
      let campaignActive=false;
      if(effectiveCid){
        const{data:camp}=await sb.from('campaigns').select('status').eq('id',effectiveCid).single();
        campaignActive=camp?.status==='active';
      }
      if(campaignActive){ins.forEach(p=>{p.approved=true;p.status='in sequence';p.next_send_at=new Date().toISOString();});}
      for(let i=0;i<ins.length;i+=100)await sb.from('prospects').insert(ins.slice(i,i+100));
      closeModal();
      if(campaignActive)toast(`✅ Imported ${ins.length} prospects — auto-approved, sequence will start shortly!`,'success');
      else toast(`✅ Imported ${ins.length} prospects`,'success');
      go('prospects');
    }catch(err){toast('Error: '+err.message,'error');btn.disabled=false;btn.innerHTML='Import';}
  };
  if(file.name.endsWith('.csv'))reader.readAsText(file);else reader.readAsBinaryString(file);
}

async function getApiKeys(){
  const{data}=await sb.from('api_keys').select('*').eq('user_id',U.id).eq('is_active',true).order('usage_count',{ascending:true});
  const fc=(data||[]).filter(k=>k.service==='firecrawl').map(k=>k.key_value);
  const gr=(data||[]).filter(k=>k.service==='groq').map(k=>k.key_value);
  return{fc,gr};
}
async function researchOne(id){
  if(!planGate('ai')){return;}
  const{data:p}=await sb.from('prospects').select('*').eq('id',id).single();
  if(!p)return;
  await sb.from('prospects').update({research_status:'in progress'}).eq('id',id);
  // Optimistically update UI
  const row=document.querySelector(`input.pcb[value="${id}"]`)?.closest('tr');
  if(row){const cells=[...row.cells];if(cells[5])cells[5].innerHTML=`<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;}
  try{
    const backend=await getBackend();
    if(!backend)throw new Error('Backend URL not set. Go to Settings and add your Railway URL.');
    const{fc,gr}=await getApiKeys();
    if(!gr.length)throw new Error('No Groq keys added. Go to API Keys → add free keys from console.groq.com');
    const{data:tmpl}=await sb.from('templates').select('*').eq('user_id',U.id).order('created_at').limit(1).single();
    const resp=await fetch(`${backend}/research`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prospect:{first_name:p.first_name,last_name:p.last_name,company:p.company,website:p.website,gbp_url:p.gbp_url,industry:p.industry,location:p.location},firecrawlKeys:fc,groqKeys:gr,templateBody:tmpl?.body||'',templateSubject:tmpl?.subject||''})
    });
    const d=await resp.json();
    if(!d.success)throw new Error(d.error||'Research failed');
    // Update usage counts in DB
    const{data:keys}=await sb.from('api_keys').select('*').eq('user_id',U.id).eq('is_active',true);
    for(const k of(keys||[])){if(k.service==='groq')await sb.from('api_keys').update({usage_count:(k.usage_count||0)+1,last_used_at:new Date().toISOString()}).eq('id',k.id).limit(1);}
    await sb.from('prospects').update({research_status:'done',research_data:d.research,personalized_line:d.research?.personalizedLine||'',draft_email:d.draftEmail||'',draft_subject:d.draftSubject||''}).eq('id',id);
    toast(`✅ Research done: ${p.first_name} ${p.last_name}`,'success');
  }catch(err){
    await sb.from('prospects').update({research_status:'failed'}).eq('id',id);
    toast(`Research failed: ${err.message}`,'error');
  }
  if(currentPage==='prospects')go('prospects');

async function sendNow(id){
  const{data:p}=await sb.from('prospects').select('*').eq('id',id).single();
  if(!p){toast('Prospect not found','error');return;}
  if(!p.draft_email){toast('No draft email — research this prospect first','error');return;}
  const{data:acc}=p.assigned_account_id?await sb.from('email_accounts').select('*').eq('id',p.assigned_account_id).single():{data:null};
  if(!acc){toast('No sending account assigned','error');return;}
  if(acc.status!=='active'){toast('Sending account is paused','error');return;}
  const backend=await getBackend();
  if(!backend){toast('Set backend URL in Settings first','error');return;}
  toast(`Sending to ${p.email}...`,'info');
  try{
    const subject=mv(p.draft_subject,p,acc)||'Hello';
    const body=mv(p.draft_email,p,acc);
    const{data:settings}=await sb.from('settings').select('reply_to').eq('id',U.id).single();
    const r=await fetch(`${backend}/send`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fromEmail:acc.email,appPassword:acc.app_password,displayName:acc.display_name,toEmail:p.email,subject,body,replyTo:settings?.reply_to||'',accountId:acc.id})
    });
    const d=await r.json();
    if(d.success){
      await sb.from('prospects').update({emails_sent:(p.emails_sent||0)+1,status:'in sequence',approved:true,last_sent_at:new Date().toISOString()}).eq('id',id);
      await sb.from('email_accounts').update({sent_today:(acc.sent_today||0)+1,total_sent:(acc.total_sent||0)+1}).eq('id',acc.id);
      toast(`✅ Email sent to ${p.email}!`,'success');
      if(currentPage==='prospects')go('prospects');
    }else{
      toast('❌ Send failed: '+d.error,'error');
    }
  }catch(err){toast('❌ Error: '+err.message,'error');}
}

async function openWfModal(editId){
  const{data:tmpl}=await sb.from('templates').select('id,name').eq('user_id',U.id);
  const topts=(tmpl||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  let steps=[],name='';
  if(editId){const{data:w}=await sb.from('workflows').select('*').eq('id',editId).single();steps=w?.steps||[];name=w?.name||'';}
  else{
    const fid=tmpl?.[0]?.id||'';
    steps=[{id:uid(),type:'email',templateId:fid,includePersonalizedLine:true},{id:uid(),type:'condition_reply'},{id:uid(),type:'wait',days:3},{id:uid(),type:'email',templateId:tmpl?.[1]?.id||fid,includePersonalizedLine:false},{id:uid(),type:'condition_reply'},{id:uid(),type:'wait',days:4},{id:uid(),type:'email',templateId:tmpl?.[2]?.id||fid,includePersonalizedLine:false},{id:uid(),type:'stop'}];
  }
  window._ws=[...steps];
  const stypes=[{v:'email',l:'📧 Send Email'},{v:'scout_email',l:'🤖 Scout AI Email (personalised per prospect)'},{v:'wait',l:'⏰ Wait N Days'},{v:'condition_reply',l:'🔁 Stop if Replied'},{v:'condition_unsub',l:'🚫 Stop if Unsubscribed'},{v:'condition_open',l:'👁 Only if Opened'},{v:'tag',l:'🏷 Apply Tag'},{v:'stop',l:'🛑 End Sequence'}];
  function rsw(ss){
    return ss.map((s,i)=>`<div class="wf-step"><div class="wf-num">${i+1}</div><div style="flex:1">
      <select onchange="wsct('${s.id}',this.value)" style="width:auto;min-width:180px;margin-bottom:8px">${stypes.map(t=>`<option value="${t.v}" ${s.type===t.v?'selected':''}>${t.l}</option>`).join('')}</select>
      ${s.type==='email'?`
        <div class="fr">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label style="margin:0">Template${s.abEnabled?' A':''}</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0;font-size:12px">
              <label class="sw"><input type="checkbox" ${s.abEnabled?'checked':''} onchange="wsu('${s.id}','abEnabled',this.checked);wsct('${s.id}',s.type)"><div class="sw-sl"></div></label>
              <span style="color:var(--amber)">🔀 A/B Test</span>
            </label>
          </div>
          <select onchange="wsu('${s.id}','templateId',this.value)">${topts.replace(`value="${s.templateId}"`,`value="${s.templateId}" selected`)}</select>
        </div>
        ${s.abEnabled?`<div class="fr"><label>Template B</label><select onchange="wsu('${s.id}','templateIdB',this.value)">${topts.replace(`value="${s.templateIdB}"`,`value="${s.templateIdB}" selected`)}</select></div><div style="padding:8px 10px;background:var(--amber-dim);border:1px solid var(--amber);border-radius:var(--radius);font-size:12px;color:var(--amber);margin-bottom:8px">Prospects are split 50/50 — half get Template A, half get Template B. Check Analytics to see which performs better.</div>`:''}
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><label class="sw"><input type="checkbox" ${s.includePersonalizedLine?'checked':''} onchange="wsu('${s.id}','includePersonalizedLine',this.checked)"><div class="sw-sl"></div></label>Include AI personalized line</label>
      `:''}
      ${s.type==='scout_email'?`<div style="padding:10px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);font-size:12px;color:var(--text)">🤖 Scout will write a fully personalised cold email for each prospect using their research data and your business info. No template needed — Scout handles it all.</div>`:''}
      ${s.type==='wait'?`<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><label style="margin:0;white-space:nowrap;min-width:80px">Wait days:</label><input type="number" min="1" max="365" value="${s.days||3}" style="width:80px" onchange="wsu('${s.id}','days',+this.value)"/></div>`:''}
      ${s.type==='tag'?`<input value="${s.tag||''}" placeholder="Tag name" style="margin-top:4px" onchange="wsu('${s.id}','tag',this.value)"/>`:''}
    </div><button class="btn xs danger" onclick="wsr('${s.id}')">✕</button></div>`).join('<div style="display:flex;justify-content:center"><div style="width:2px;height:8px;background:var(--border2)"></div></div>');
  }
  window._wfR=rsw;
  modal(`<div class="modal wide">
    <div class="modal-hdr">${editId?'Edit':'New'} Workflow <button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fr"><label>Workflow Name</label><input id="wfn" value="${name}" placeholder="e.g. 3-Step Cold Outreach"/></div>

    <div id="wfsteps">${rsw(window._ws)}</div>

      <button class="btn primary" onclick="saveWf('${editId||''}')">Save Workflow</button>
    </div>
  </div>`);
}
window.wsct=function(id,t){window._ws=window._ws.map(s=>s.id===id?{...s,type:t}:s);document.getElementById('wfsteps').innerHTML=window._wfR(window._ws);};
window.wsu=function(id,k,v){window._ws=window._ws.map(s=>s.id===id?{...s,[k]:v}:s);};
window.wsr=function(id){window._ws=window._ws.filter(s=>s.id!==id);document.getElementById('wfsteps').innerHTML=window._wfR(window._ws);};
window.wsa=function(){window._ws.push({id:uid(),type:'email',includePersonalizedLine:false});document.getElementById('wfsteps').innerHTML=window._wfR(window._ws);};
async function saveWf(id){
  const name=document.getElementById('wfn').value.trim();

  if(id)await sb.from('workflows').update({name,steps:window._ws,updated_at:new Date().toISOString()}).eq('id',id);
  else await sb.from('workflows').insert({user_id:U.id,name,steps:window._ws});
  closeModal();toast('Workflow saved','success');go('workflows');
}

async function filterInbox(s){

  const{data}=await q.order('received_at',{ascending:false});

  const stats=['Interested','Not Interested','Needs Follow Up','Booked Meeting'];
  document.getElementById('ilist').innerHTML=(data||[]).map(item=>`<div class="inbox-item"><div class="iav">${(item.from_name||'?')[0].toUpperCase()}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><div style="font-weight:500">${item.from_name||item.from_email}</div><span class="tag ${sc[item.status]||'blue'}">${item.status}</span></div><div style="font-size:12px;color:var(--text2)">${item.preview||''}</div><div style="margin-top:6px;display:flex;gap:4px"><button class="btn xs" onclick="viewInboxItem('${item.id}')">👁 View</button>${stats.map(s=>`<button class="btn xs" onclick="setIS('${item.id}','${s}')">${s}</button>`).join('')}</div></div></div>`).join('');
}
async function setIS(id,s){await sb.from('inbox').update({status:s}).eq('id',id);go('inbox');}
async function checkReplies(){
  const btn=document.getElementById('check-replies-btn');
  if(btn){btn.disabled=true;btn.innerHTML='📬 Checking...';}
  const backend=await getBackend();
  if(!backend){toast('Set backend URL in Settings first','error');if(btn){btn.disabled=false;btn.innerHTML='📬 Check Replies';}return;}
  const{data:accs}=await sb.from('email_accounts').select('*').eq('user_id',U.id).eq('status','active');
  if(!accs?.length){toast('No active sending accounts','error');if(btn){btn.disabled=false;btn.innerHTML='📬 Check Replies';}return;}
  const{data:prospects}=await sb.from('prospects').select('email,first_name,last_name,id').eq('user_id',U.id);
  const prospectEmails=new Set((prospects||[]).map(p=>p.email.toLowerCase()));
  const prospectMap=Object.fromEntries((prospects||[]).map(p=>[p.email.toLowerCase(),p]));
  let totalFound=0;
  toast(`Checking ${accs.length} account${accs.length>1?'s':''} for replies...`,'info');
  for(const acc of accs){
    try{
      const r=await fetch(`${backend}/check-replies`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fromEmail:acc.email,appPassword:acc.app_password,prospectEmails:[...prospectEmails]}),
        signal:AbortSignal.timeout(30000)
      });
      const d=await r.json();
      if(d.success&&d.replies?.length){
        for(const reply of d.replies){
          const prospect=prospectMap[reply.from.toLowerCase()];
          if(!prospect)continue;
          // Check if already logged
          const{data:existing}=await sb.from('inbox').select('id').eq('user_id',U.id).eq('from_email',reply.from).eq('preview',reply.preview?.slice(0,120)||'').limit(1);
          if(existing?.length)continue;
          await sb.from('inbox').insert({user_id:U.id,prospect_id:prospect.id,from_email:reply.from,from_name:reply.fromName||prospect.first_name+' '+prospect.last_name,body:reply.body||'',preview:reply.preview?.slice(0,120)||'',status:'new',received_at:reply.date||new Date().toISOString()});
          await sb.from('prospects').update({status:'replied'}).eq('id',prospect.id);
          totalFound++;
        }
      }
    }catch(e){console.log('Error checking '+acc.email+':',e.message);}
  }
  if(btn){btn.disabled=false;btn.innerHTML='📬 Check Replies';}
  if(totalFound>0){toast(`✅ Found ${totalFound} new repl${totalFound>1?'ies':'y'}!`,'success');go('inbox');}
  else{toast('No new replies found from known prospects','info');}
}

async function testBackend(){
  const url=document.getElementById('sbu').value.trim().replace(/\/$/,'');
  if(!url){toast('Enter backend URL first','error');return;}
  toast('Testing connection...','info');
  try{const r=await fetch(`${url}/`,{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.status==='ok')toast(`✅ Connected! Backend v${d.version} is running`,'success');else toast('Backend responded but unexpected format','error');}
  catch(e){toast('❌ Could not reach backend: '+e.message,'error');}
}

async function pgAnalytics(el, ta) {
  const {data:camps} = await sb.from('campaigns').select('id,name').eq('user_id',U.id);
  ta.innerHTML=`<select id="acf" onchange="pgAnalytics(document.getElementById('page-content'),document.getElementById('topbar-actions'))" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:7px 12px;font-size:13px;font-family:inherit">
    <option value="">All Campaigns</option>
    ${(camps||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
  </select>`;
  const campId=document.getElementById('acf')?.value||'';
  let histQ=sb.from('email_history').select('*,ab_variant').eq('user_id',U.id);
  let prosQ=sb.from('prospects').select('status,emails_sent,campaign_id').eq('user_id',U.id);
  if(campId){histQ=histQ.eq('campaign_id',campId);prosQ=prosQ.eq('campaign_id',campId);}
  const[{data:hist},{data:pros}]=await Promise.all([histQ.order('sent_at',{ascending:true}),prosQ]);

  const totalSent=hist?.length||0;
  const totalOpened=(hist||[]).filter(h=>h.opened).length;
  const openRate=totalSent?Math.round(totalOpened/totalSent*100):0;
  const replied=(pros||[]).filter(p=>p.status==='replied').length;
  const replyRate=pros?.length?Math.round(replied/pros.length*100):0;
  const inSeq=(pros||[]).filter(p=>p.status==='in sequence').length;
  const completed=(pros||[]).filter(p=>p.status==='completed').length;

  // Group emails by day for chart
  const byDay={};
  (hist||[]).forEach(h=>{
    const day=h.sent_at?.slice(0,10);
    if(!day)return;
    if(!byDay[day])byDay[day]={sent:0,opened:0};
    byDay[day].sent++;
    if(h.opened)byDay[day].opened++;
  });
  const days=Object.keys(byDay).sort().slice(-30);
  const maxSent=Math.max(...days.map(d=>byDay[d].sent),1);

  // Step funnel
  const stepCounts={};
  (hist||[]).forEach(h=>{
    const s=h.step_index||0;
    stepCounts[s]=(stepCounts[s]||0)+1;
  });
  const maxSteps=Math.max(...Object.keys(stepCounts).map(Number),0)+1;

  el.innerHTML=`
  <div class="grid4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-lbl">Emails Sent</div><div class="stat-val">${totalSent}</div></div>
    <div class="stat"><div class="stat-lbl">Open Rate</div><div class="stat-val" style="color:var(--accent)">${openRate}%</div><div class="stat-sub">${totalOpened} opened</div></div>
    <div class="stat"><div class="stat-lbl">Reply Rate</div><div class="stat-val" style="color:var(--green)">${replyRate}%</div><div class="stat-sub">${replied} replies</div></div>
    <div class="stat"><div class="stat-lbl">In Sequence</div><div class="stat-val">${inSeq}</div><div class="stat-sub">${completed} completed</div></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="section-title">📊 Emails Sent Per Day (last 30 days)</div>
      ${days.length===0?`<div style="color:var(--text3);font-size:13px;text-align:center;padding:40px">No emails sent yet</div>`:`
      <div style="display:flex;align-items:flex-end;gap:3px;height:120px;margin-bottom:8px">
        ${days.map(d=>{
          const pct=Math.round((byDay[d].sent/maxSent)*100);
          const opct=Math.round((byDay[d].opened/Math.max(byDay[d].sent,1))*100);
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${d}: ${byDay[d].sent} sent, ${byDay[d].opened} opened">
            <div style="width:100%;background:var(--accent);border-radius:2px 2px 0 0;height:${pct}%" class="bar-sent"></div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
        <span>${days[0]||''}</span><span>${days[days.length-1]||''}</span>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:10px;height:10px;background:var(--accent);border-radius:2px"></div>Sent</div>
      </div>`}
    </div>

    <div class="card">
      <div class="section-title">🔽 Sequence Funnel</div>
      ${maxSteps===0?`<div style="color:var(--text3);font-size:13px;text-align:center;padding:40px">No sequence data yet</div>`:`
      <div style="display:flex;flex-direction:column;gap:8px">
        ${Array.from({length:maxSteps},(_, i)=>{
          const count=stepCounts[i]||0;
          const pct=stepCounts[0]?Math.round(count/stepCounts[0]*100):0;
          return`<div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
              <span style="color:var(--text2)">Email ${i+1}</span>
              <span style="color:var(--text)">${count} sent (${pct}%)</span>
            </div>
            <div class="pbw"><div class="pb" style="width:${pct}%;background:var(--accent)"></div></div>
          </div>`;
        }).join('')}
        <div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:var(--green)">Replies</span>
            <span style="color:var(--green)">${replied}</span>
          </div>
          <div class="pbw"><div class="pb green" style="width:${stepCounts[0]?Math.round(replied/stepCounts[0]*100):0}%"></div></div>
        </div>
      </div>`}
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="section-title">🔀 A/B Test Results</div>
    ${(()=>{
      const abHist=(hist||[]).filter(h=>h.ab_variant);
      if(!abHist.length)return`<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">No A/B tests running yet. Enable A/B testing on any email step in your workflows.</div>`;
      const aEmails=abHist.filter(h=>h.ab_variant==='A');
      const bEmails=abHist.filter(h=>h.ab_variant==='B');
      const aOpened=aEmails.filter(h=>h.opened).length;
      const bOpened=bEmails.filter(h=>h.opened).length;
      const aRate=aEmails.length?Math.round(aOpened/aEmails.length*100):0;
      const bRate=bEmails.length?Math.round(bOpened/bEmails.length*100):0;
      const winner=aRate>bRate?'A':bRate>aRate?'B':'tie';
      return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="padding:16px;background:var(--bg3);border-radius:var(--radius);border:2px solid ${winner==='A'?'var(--green)':'var(--border)'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600">Template A</div>
            ${winner==='A'?`<span class="tag green">🏆 Winner</span>`:''}
          </div>
          <div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:var(--accent)">${aRate}%</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">Open rate · ${aEmails.length} sent · ${aOpened} opened</div>
          <div class="pbw" style="margin-top:10px"><div class="pb" style="width:${aRate}%;background:var(--accent)"></div></div>
        </div>
        <div style="padding:16px;background:var(--bg3);border-radius:var(--radius);border:2px solid ${winner==='B'?'var(--green)':'var(--border)'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600">Template B</div>
            ${winner==='B'?`<span class="tag green">🏆 Winner</span>`:''}
          </div>
          <div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:var(--purple)">${bRate}%</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">Open rate · ${bEmails.length} sent · ${bOpened} opened</div>
          <div class="pbw" style="margin-top:10px"><div class="pb" style="width:${bRate}%;background:var(--purple)"></div></div>
        </div>
      </div>${winner==='tie'?`<div style="text-align:center;font-size:12px;color:var(--text3);margin-top:10px">Need more data to determine a winner</div>`:`<div style="text-align:center;font-size:13px;color:var(--green);margin-top:12px;font-weight:500">Template ${winner} is outperforming by ${Math.abs(aRate-bRate)}% — consider making it your default</div>`}`;
    })()}
  </div>

  <div class="card">
    <div class="section-title">📧 Recent Email Activity</div>
    ${!hist?.length?`<div style="color:var(--text3);font-size:13px;text-align:center;padding:30px">No email activity yet</div>`:`
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Prospect</th><th>Subject</th><th>Step</th><th>Sent</th><th>Opened</th>
      </tr></thead>
      <tbody>${(hist||[]).slice(-20).reverse().map(h=>`<tr>
        <td style="font-size:12px">${h.prospect_id?.slice(0,8)||'—'} ${h.ab_variant?`<span class="tag ${h.ab_variant==='A'?'blue':'purple'}" style="font-size:9px">${h.ab_variant}</span>`:''}</td>
        <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.subject||'—'}</td>
        <td><span class="tag gray">Step ${(h.step_index||0)+1}</span></td>
        <td style="font-size:11px;color:var(--text2)">${h.sent_at?new Date(h.sent_at).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</td>
        <td>${h.opened?`<span class="tag green">✓ Opened</span>`:`<span class="tag gray">—</span>`}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function getStripeLink(plan, billing) {
  const base = STRIPE_LINKS[plan + '_' + billing];
  if (!base) return '#';
  // Pass user ID and email as prefilled params so webhook can identify user
  const params = new URLSearchParams({
    prefilled_email: U?.email || '',
    client_reference_id: U?.id || ''
  });
  return base + '?' + params.toString();
}

// ── Scout AI ──────────────────────────────────────────────────────────────────
const SCOUT_KNOWLEDGE = {
  hormozi: `
HORMOZI OFFER FRAMEWORK (Grand Slam Offer):
- The goal is to make an offer so good people feel stupid saying no
- Value Equation: Dream Outcome x Perceived Likelihood of Achievement / Time Delay x Effort & Sacrifice
- Increase dream outcome (what life looks like after), increase certainty it works, decrease time to result, decrease effort required
- Stack bonuses until the offer feels like theft
- Reverse the risk: "If you don't get X result in Y days, we'll Z"
- Price anchoring: show what problem costs them NOW vs your solution cost
- Use specificity: not "more leads" but "14 qualified calls in 30 days"
- The Niche: go so specific it feels like you read their diary
- Never compete on price — compete on value and certainty
- Dream outcome framing: sell the destination, not the vehicle
- Remove ALL friction from saying yes — free trial, money back, done-for-you

HORMOZI COLD EMAIL PRINCIPLES:
- Get to the point in sentence 1. No preamble. No "hope this finds you well"
- Lead with THEIR problem, not your product
- Make one specific claim backed by a specific result
- One CTA only. Never give options — options cause paralysis
- Short is better. 3-5 sentences max for first email
- The subject line should be so specific it feels personal
- Pattern interrupt: say something they didn't expect
- Reference something real about them — never make things up
- The PS line is often the most read line — use it
`,
  copywriting: `
COPYWRITING FRAMEWORKS FOR COLD EMAIL:

PAS (Problem-Agitate-Solution):
- Problem: Name their exact pain point
- Agitate: Twist the knife — what does this cost them? Time, money, opportunity
- Solution: Position your offer as the obvious fix
Example: "Most [ICP] are losing £X/month because [problem]. That compounds over a year to £Y. We fix this in [timeframe]."

AIDA (Attention-Interest-Desire-Action):
- Attention: Grab with a bold statement or specific insight
- Interest: Explain why it matters to THEM specifically
- Desire: Paint the picture of life with your solution
- Action: One clear next step

BAB (Before-After-Bridge):
- Before: Their current painful reality
- After: The dream outcome they want
- Bridge: Your solution is how they get there

4 Ps (Promise-Picture-Proof-Push):
- Promise: The result you deliver
- Picture: What that looks like in their world
- Proof: Evidence it works (case study, stat, testimonial)
- Push: Urgency or reason to act now

DIRECT RESPONSE RULES:
- Every sentence must earn the next sentence being read
- Benefits over features always — not "AI-powered" but "saves 10 hours/week"
- Specificity creates credibility — "47 clients" beats "many clients"
- Social proof beats claims — let results speak
- Urgency must be real — manufactured urgency kills trust
- Write like you talk — conversational, not corporate
- Short sentences. Short paragraphs. White space is your friend
- The CTA should be low commitment — "worth a quick chat?" not "book a demo"
`,
  subject_lines: `
SUBJECT LINE MASTERY:

What makes a subject line work:
- Curiosity gap: hints at value without revealing it
- Specificity: numbers, names, companies feel personal
- Pattern interrupt: unexpected or slightly odd phrasing
- Low threat: sounds like a human, not a marketing email
- Short: 4-7 words is ideal

Formulas that work:
- "Quick question about [specific thing on their site]"
- "[Mutual connection] suggested I reach out"
- "Idea for [company] — [specific benefit]"
- "[Competitor] is doing this — are you?"
- "Re: [their recent achievement/news]"
- "[Number] [timeframe] — [result]"
- Just: "[First name]" (ultra personal feel)

What kills open rates:
- "I wanted to reach out..." (bin immediately)
- ALL CAPS or excessive punctuation!!!
- Generic: "Partnership opportunity"
- Too salesy: "Double your revenue"
- Vague: "Checking in"
- Emoji overuse

Split test rule: always run 2 subject lines, kill the loser after 100 sends
`,
  follow_up: `
FOLLOW-UP SEQUENCE STRATEGY:

Why follow-up works:
- 80% of sales happen after the 5th touchpoint
- Most cold emailers give up after 1-2 attempts
- Follow-up is not pestering — it's persistence with value

Sequence structure:
- Email 1 (Day 0): The main pitch — specific, short, one CTA
- Email 2 (Day 3-4): Different angle or new value add — not "just following up"
- Email 3 (Day 7-8): Social proof email — case study, result, testimonial
- Email 4 (Day 14): The break-up email — permission to say no, creates urgency

Each follow-up should:
- Add new information or perspective — never just "bump"
- Reference the previous email briefly
- Be shorter than the last
- Have a different subject line angle

Break-up email formula (highest reply rates):
"[Name], I've reached out a few times without hearing back. I'll take that as a no for now and won't bother you again. If [trigger event — they raise funding, hit a problem, change role] ever makes this relevant, my door's open. [Name]"

This works because:
- Removes pressure completely
- Creates FOMO
- People reply to say no — which opens a conversation
`,
  personalisation: `
PERSONALISATION AT SCALE:

The personalised line rules:
- Must reference something SPECIFIC and REAL — never invented
- Reference their actual work, not generic industry facts
- Compliment the work, not the company ("Love how you help X do Y" not "Great company")
- Be specific enough that it could only apply to THEM
- 1-2 sentences maximum — it's a hook, not an essay
- Never start with "I" — start with them

Sources for personalisation (what to look for on their site):
- A specific product or service they offer
- A niche they serve that's unusual
- A result or case study they've published
- A blog post or content they've created
- Their company mission or values (if distinctive)
- Recent news, launch, or achievement
- The problem they solve for their customers

What to NEVER do:
- Make up facts about their website
- Reference things you didn't actually see
- Use generic lines like "I noticed you're in the X space"
- Copy-paste the same line for multiple prospects
- Mention you "came across" their website — too salesy

The mirror technique:
Research their customers' pain points → connect that pain to your solution
"Your clients are [X problem] — we help companies like yours solve that at scale."
`,
  deliverability: `
EMAIL DELIVERABILITY — STAYING OUT OF SPAM:

Technical fundamentals:
- SPF, DKIM, DMARC records must be set up on your domain
- Use a separate sending domain (not your main domain) — cold@youroutreach.com
- Warm up accounts slowly: start 20/day, add 20/day each week
- Never exceed 100 emails/day from a fresh domain in first month

Content rules:
- Plain text > HTML for cold email (simulates personal email)
- No images in first cold email
- One link maximum — or zero links in first touch
- Avoid spam trigger words: "free", "guarantee", "act now", "limited time", "click here"
- Personalise subject line and opener — mass emails get flagged
- Keep emails under 150 words for better deliverability

Sending patterns:
- Send Mon-Thu, 9am-5pm in recipient's timezone
- Randomise send times — don't send 500 at exactly 9:00am
- Keep bounce rate under 2% — clean your lists
- Remove unsubscribes immediately
- Stop sequence when prospect replies — don't keep emailing

List hygiene:
- Verify emails before sending (use NeverBounce or ZeroBounce)
- Remove catch-all emails from cold campaigns
- Segment by persona — never send one template to everyone
`
};

function getRelevantKnowledge(question) {
  const q = question.toLowerCase();
  let chunks = [];
  if(q.includes('offer') || q.includes('hormozi') || q.includes('value') || q.includes('price') || q.includes('deal') || q.includes('package') || q.includes('risk')) chunks.push(SCOUT_KNOWLEDGE.hormozi);
  if(q.includes('copy') || q.includes('write') || q.includes('framework') || q.includes('aida') || q.includes('pas') || q.includes('formula') || q.includes('structure') || q.includes('email')) chunks.push(SCOUT_KNOWLEDGE.copywriting);
  if(q.includes('subject') || q.includes('open rate') || q.includes('title') || q.includes('headline')) chunks.push(SCOUT_KNOWLEDGE.subject_lines);
  if(q.includes('follow') || q.includes('sequence') || q.includes('bump') || q.includes('chase') || q.includes('reply')) chunks.push(SCOUT_KNOWLEDGE.follow_up);
  if(q.includes('personal') || q.includes('specific') || q.includes('research') || q.includes('prospect') || q.includes('line') || q.includes('opener')) chunks.push(SCOUT_KNOWLEDGE.personalisation);
  if(q.includes('spam') || q.includes('deliver') || q.includes('inbox') || q.includes('warm') || q.includes('domain') || q.includes('dkim') || q.includes('bounce')) chunks.push(SCOUT_KNOWLEDGE.deliverability);
  // Default: include hormozi and copywriting for general questions
  if(chunks.length === 0) chunks = [SCOUT_KNOWLEDGE.hormozi, SCOUT_KNOWLEDGE.copywriting];
  return chunks.join('\n\n');
}

let scoutHistory = [];
let scoutBiz = {};

async function pgScout(el, ta) {

function scoutQuick(q){document.getElementById('scout-input').value=q;sendScout();}

async function sendScout(){
  const input=document.getElementById('scout-input');
  const q=input.value.trim();
  if(!q)return;
  input.value='';

  // Add user message
  const msgs=document.getElementById('scout-msgs');
  msgs.innerHTML+=`<div style="display:flex;justify-content:flex-end"><div class="scout-bubble user">${q}</div></div>`;
  msgs.scrollTop=msgs.scrollHeight;

  // Add thinking indicator
  const thinkId='think-'+Date.now();
  msgs.innerHTML+=`<div id="${thinkId}" style="display:flex;gap:10px;align-items:flex-start"><div class="scout-avatar">🎯</div><div class="scout-bubble scout"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;

  // Build business context
  // Scrape business website if provided and not cached
  let bizWebsiteContent='';
  if(scoutBiz.biz_website&&!window._bizWebsiteCache){
    try{
      const backend=await getBackend();
      if(backend){
        const sr=await fetch(`${backend}/scrape`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:scoutBiz.biz_website,firecrawlKeys:[]})});
        const sd=await sr.json();
        if(sd.text){bizWebsiteContent=sd.text.slice(0,1500);window._bizWebsiteCache=bizWebsiteContent;}
      }
    }catch(e){}
  } else if(window._bizWebsiteCache){
    bizWebsiteContent=window._bizWebsiteCache;
  }

  const bizCtx = scoutBiz.biz_product ? `
USER'S BUSINESS CONTEXT (use this to give specific, relevant advice):
- What they sell: ${scoutBiz.biz_product||'Not specified'}
- Ideal customer: ${scoutBiz.biz_icp||'Not specified'}
- Problem they solve: ${scoutBiz.biz_problem||'Not specified'}
- Value/result they deliver: ${scoutBiz.biz_value||'Not specified'}
- Their offer/CTA: ${scoutBiz.biz_offer||'Not specified'}
- Social proof: ${scoutBiz.biz_proof||'Not specified'}
- Their website: ${scoutBiz.biz_website||'Not provided'}
${bizWebsiteContent?`- Website content: ${bizWebsiteContent}`:''}
- Additional context: ${scoutBiz.biz_extra||'None'}
` : 'No business info provided yet — give general advice and suggest they add their business info in Settings.';

  // Get relevant knowledge
  const knowledge = getRelevantKnowledge(q);

  // Build system prompt
  const systemPrompt = `You are Scout, a cold email and direct response copywriting strategist. You are direct, professional, and results-focused. You do not give generic advice — you give specific, actionable guidance based on proven frameworks.

YOUR EXPERTISE IS GROUNDED IN:
${knowledge}

${bizCtx}

RULES YOU ALWAYS FOLLOW:
1. Never tell someone to lie or fabricate facts about a prospect's business
2. Only reference real, verifiable things about prospects in email examples
3. Be direct — no fluff, no "great question!", no corporate speak
4. Give specific examples, not vague principles
5. When writing emails, make them short, punchy, and human
6. Always lead with the prospect's problem, not your product
7. Use Hormozi frameworks as your primary mental model for offers
8. If asked to write an email and you have business context, use it specifically
9. Format responses clearly — use line breaks, not walls of text
10. Sound like a professional strategist, not a chatbot`;

  // Add to history
  scoutHistory.push({role:'user',content:q});

  // Call Groq with key rotation
  try{
    const{data:keys}=await sb.from('api_keys').select('*').eq('user_id',U.id).eq('service','groq').eq('is_active',true).order('usage_count',{ascending:true});
    const groqKeys=(keys||[]).map(k=>k.key_value);
    if(!groqKeys.length){
      document.getElementById(thinkId).outerHTML=`<div style="display:flex;gap:10px;align-items:flex-start"><div class="scout-avatar">🎯</div><div class="scout-bubble scout" style="color:var(--red)">No Groq API keys added. Go to API Keys page to add free keys from console.groq.com</div></div>`;
      return;
    }
    let response='';
    for(const key of groqKeys){
      try{
        const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
          body:JSON.stringify({
            model:'llama-3.3-70b-versatile',
            messages:[{role:'system',content:systemPrompt},...scoutHistory.slice(-6)],
            max_tokens:1200,
            temperature:0.7
          })
        });
        const d=await r.json();
        if(d.choices?.[0]?.message?.content){
          response=d.choices[0].message.content;
          // Update usage count
          const usedKey=keys.find(k=>k.key_value===key);
          if(usedKey)await sb.from('api_keys').update({usage_count:(usedKey.usage_count||0)+1,last_used_at:new Date().toISOString()}).eq('id',usedKey.id);
          break;
        }
        if(r.status===429)continue;
      }catch(e){continue;}
    }
    if(!response)response='All Groq keys are rate limited right now. Wait a minute and try again, or add more Groq keys in API Keys.';
    scoutHistory.push({role:'assistant',content:response});
    // Format response - convert newlines to breaks
    const formatted=response.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    document.getElementById(thinkId).outerHTML=`<div style="display:flex;gap:10px;align-items:flex-start"><div class="scout-avatar">🎯</div><div class="scout-bubble scout">${formatted}</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }catch(err){
    document.getElementById(thinkId).outerHTML=`<div style="display:flex;gap:10px;align-items:flex-start"><div class="scout-avatar">🎯</div><div class="scout-bubble scout" style="color:var(--red)">Error: ${err.message}</div></div>`;
  }
}
