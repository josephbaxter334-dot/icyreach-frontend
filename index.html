<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IcyReach CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;--bg2:#0f1320;--bg3:#151b2e;--bg4:#1c2338;
  --border:#ffffff14;--border2:#ffffff22;
  --text:#e8eaf0;--text2:#8b93a8;--text3:#525d75;
  --accent:#4f8ef7;--accent2:#3d7ef5;--accent-dim:#4f8ef718;
  --green:#2dd98b;--green-dim:#2dd98b18;
  --amber:#f5a623;--amber-dim:#f5a62318;
  --red:#f05656;--red-dim:#f0565618;
  --purple:#a78bfa;--purple-dim:#a78bfa18;
  --radius:8px;--radius2:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px}
/* AUTH */
#auth-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .ico{font-size:42px;margin-bottom:10px}
.auth-logo h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:700}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:5px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg3);border-radius:10px;padding:4px}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.15s}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.msg.err{background:var(--red-dim);border:1px solid var(--red);color:var(--red)}
.msg.ok{background:var(--green-dim);border:1px solid var(--green);color:var(--green)}
/* APP */
#app-wrap{display:none;width:100%;height:100%}
#app{display:flex;width:100%;height:100%}
aside{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3)}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.ns{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 8px 6px;font-weight:500}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent)}
.ni .ic{font-size:15px;width:18px;text-align:center}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.aside-bot{padding:12px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:8px}
.uav{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.uemail{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;min-height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.topbar h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;flex:1}
.page{flex:1;overflow-y:auto;padding:24px}
/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--bg3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent2);color:#fff}
.btn.primary:hover:not(:disabled){background:var(--accent2)}
.btn.danger{color:var(--red);border-color:var(--red-dim)}
.btn.success{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:5px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:16px}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:500}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tag.green{background:var(--green-dim);color:var(--green)}
.tag.red{background:var(--red-dim);color:var(--red)}
.tag.amber{background:var(--amber-dim);color:var(--amber)}
.tag.blue{background:var(--accent-dim);color:var(--accent)}
.tag.purple{background:var(--purple-dim);color:var(--purple)}
.tag.gray{background:var(--bg4);color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius2);border:1px solid var(--border)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-size:13px;font-family:inherit;width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg3)}
label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fr{margin-bottom:14px}
.fr.row{display:flex;gap:12px}
.fr.row>*{flex:1}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pbw{background:var(--bg4);border-radius:20px;height:6px;overflow:hidden}
.pb{height:6px;border-radius:20px;background:var(--accent)}
.pb.green{background:var(--green)}.pb.amber{background:var(--amber)}.pb.red{background:var(--red)}
.modal-bg{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:680px}
.modal-hdr{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.xbtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.xbtn:hover{color:var(--text)}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;animation:tin .25s ease;display:flex;align-items:center;gap:10px;min-width:260px;max-width:380px}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--accent);color:var(--accent)}
@keyframes tin{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.thinking{display:inline-flex;align-items:center;gap:5px;color:var(--accent);font-size:12px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ep{background:var(--bg4);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text2);font-family:'DM Mono',monospace;max-height:300px;overflow-y:auto;border:1px solid var(--border)}
.tb{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.tb .search{flex:1;min-width:180px;max-width:280px}
.vc{display:inline-block;padding:1px 7px;background:var(--accent-dim);color:var(--accent);border-radius:4px;font-size:11px;cursor:pointer;margin:2px;font-family:'DM Mono',monospace}
.vc:hover{background:var(--accent);color:#fff}
.sw{position:relative;width:38px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-sl{position:absolute;inset:0;background:var(--bg4);border-radius:20px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.sw input:checked+.sw-sl{background:var(--accent);border-color:var(--accent2)}
.sw-sl:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sw-sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .ei{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:15px;color:var(--text2);margin-bottom:8px}
.seq-node{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.seq-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.seq-ico.mail{background:var(--accent-dim);color:var(--accent)}
.seq-ico.wait{background:var(--amber-dim);color:var(--amber)}
.seq-ico.cond{background:var(--purple-dim);color:var(--purple)}
.seq-ico.stop{background:var(--red-dim);color:var(--red)}
.seq-line{width:2px;height:14px;background:var(--border2);margin-left:15px;margin-bottom:4px}
.wf-step{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.wf-num{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.key-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.key-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inbox-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.inbox-item:hover{background:var(--bg3)}
.iav{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.banner{padding:14px 18px;border-radius:var(--radius2);font-size:13px;line-height:1.7;margin-bottom:20px;border:1px solid}
.banner.info{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
.banner.warn{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="ico">❄️</div><h1>IcyReach</h1><p>Cold Email CRM — Free & Unlimited</p></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="authTab('login')">Sign In</div>
      <div class="auth-tab" onclick="authTab('signup')">Create Account</div>
    </div>
    <div id="auth-msg"></div>
    <div id="login-form">
      <div class="fr"><label>Email</label><input id="l-email" type="email" placeholder="you@gmail.com" onkeydown="if(event.key==='Enter')login()"/></div>
      <div class="fr"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:11px;margin-top:4px" onclick="login()" id="l-btn">Sign In →</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="fr"><label>Email</label><input id="s-email" type="email" placeholder="you@gmail.com"/></div>
      <div class="fr"><label>Password</label><input id="s-pass" type="password" placeholder="Min 6 characters"/></div>
      <div class="fr"><label>Confirm Password</label><input id="s-pass2" type="password" onkeydown="if(event.key==='Enter')signup()"/></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:11px;margin-top:4px" onclick="signup()" id="s-btn">Create Account →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-wrap">
<div id="app">
  <aside>
    <div class="logo"><div class="logo-icon">❄️</div><div><div class="logo-text">IcyReach</div><div class="logo-sub">Cloud CRM</div></div></div>
    <nav>
      <div class="ns">Main</div>
      <div class="ni active" onclick="go('dashboard')"><span class="ic">📊</span>Dashboard</div>
      <div class="ni" onclick="go('campaigns')"><span class="ic">🚀</span>Campaigns<span class="nbadge" id="nb-c">0</span></div>
      <div class="ni" onclick="go('prospects')"><span class="ic">👥</span>Prospects<span class="nbadge" id="nb-p">0</span></div>
      <div class="ns">Tools</div>
      <div class="ni" onclick="go('workflows')"><span class="ic">⚡</span>Workflows</div>
      <div class="ni" onclick="go('templates')"><span class="ic">✉️</span>Templates</div>
      <div class="ni" onclick="go('inbox')"><span class="ic">📥</span>Inbox<span class="nbadge" id="nb-i" style="background:var(--green)">0</span></div>
      <div class="ns">Settings</div>
      <div class="ni" onclick="go('accounts')"><span class="ic">📬</span>Email Accounts</div>
      <div class="ni" onclick="go('apikeys')"><span class="ic">🔑</span>API Keys</div>
      <div class="ni" onclick="go('settings')"><span class="ic">⚙️</span>Settings</div>
    </nav>
    <div class="aside-bot">
      <div class="user-row"><div class="uav" id="uav">?</div><div class="uemail" id="uemail">...</div></div>
      <button class="btn sm danger" style="width:100%;justify-content:center" onclick="logout()">Sign Out</button>
    </div>
  </aside>
  <main>
    <div class="topbar"><h1 id="page-title">Dashboard</h1><div id="topbar-actions" style="display:flex;gap:8px"></div></div>
    <div class="page" id="page-content"></div>
  </main>
</div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div id="modal"></div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL='https://fbmsfqazwvsqndnzler.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNmcXphend2c3FuZG56bGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjUyMDksImV4cCI6MjA5NDM0MTIwOX0.dQrsrgi8W41v13egDzPrcqKoD7LRug0gEjqKGFzitBs';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let U=null,currentPage='dashboard';

// ── Utils ─────────────────────────────────────────────────────────────────────
const uid=()=>crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2);
function toast(msg,type='info'){const w=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${{success:'✅',error:'❌',info:'💬'}[type]||'💬'}</span><span>${msg}</span>`;w.appendChild(t);setTimeout(()=>t.remove(),4000);}
function modal(html){document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function closeModal(){document.getElementById('modal').innerHTML='';}
function mv(t,p,a){return(t||'').replace(/\{\{first_name\}\}/g,p?.first_name||'').replace(/\{\{last_name\}\}/g,p?.last_name||'').replace(/\{\{company\}\}/g,p?.company||'').replace(/\{\{personalized_line\}\}/g,p?.personalized_line||'[personalized line]').replace(/\{\{sender_name\}\}/g,a?.display_name||'[Sender]').replace(/\{\{sender_email\}\}/g,a?.email||'').replace(/\{\{unsubscribe_link\}\}/g,'[Unsubscribe]');}
async function getBackend(){const{data}=await sb.from('settings').select('backend_url').eq('id',U.id).single();return(data?.backend_url||'').replace(/\/$/,'');}

// ── Auth ──────────────────────────────────────────────────────────────────────
function authTab(t){
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));
  document.getElementById('login-form').style.display=t==='login'?'block':'none';
  document.getElementById('signup-form').style.display=t==='signup'?'block':'none';
  document.getElementById('auth-msg').innerHTML='';
}
function authMsg(msg,type){document.getElementById('auth-msg').innerHTML=`<div class="msg ${type}">${msg}</div>`;}
async function login(){
  const email=document.getElementById('l-email').value.trim(),pass=document.getElementById('l-pass').value;
  if(!email||!pass){authMsg('Enter email and password','err');return;}
  const btn=document.getElementById('l-btn');btn.disabled=true;btn.innerHTML='Signing in... <div class="spinner"></div>';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.innerHTML='Sign In →';
  if(error){authMsg(error.message,'err');return;}
}
async function signup(){
  const email=document.getElementById('s-email').value.trim(),pass=document.getElementById('s-pass').value,pass2=document.getElementById('s-pass2').value;
  if(!email||!pass){authMsg('Fill all fields','err');return;}
  if(pass!==pass2){authMsg('Passwords do not match','err');return;}
  if(pass.length<6){authMsg('Password must be 6+ characters','err');return;}
  const btn=document.getElementById('s-btn');btn.disabled=true;btn.innerHTML='Creating... <div class="spinner"></div>';
  const{data,error}=await sb.auth.signUp({email,password:pass});
  btn.disabled=false;btn.innerHTML='Create Account →';
  if(error){authMsg(error.message,'err');return;}
  if(data.user&&!data.session){authMsg('Check your email to confirm your account, then sign in.','ok');return;}
}
async function logout(){await sb.auth.signOut();U=null;document.getElementById('auth-wrap').style.display='flex';document.getElementById('app-wrap').style.display='none';}
async function onLogin(user){
  U=user;
  document.getElementById('auth-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  document.getElementById('uemail').textContent=user.email;
  document.getElementById('uav').textContent=(user.email||'?')[0].toUpperCase();
  await sb.from('settings').upsert({id:user.id},{onConflict:'id',ignoreDuplicates:true});
  const{data:tmpl}=await sb.from('templates').select('id').eq('user_id',user.id).limit(1);
  if(!tmpl?.length)await seedTemplates();
  go('dashboard');
}
async function seedTemplates(){
  await sb.from('templates').insert([
    {user_id:U.id,name:'Cold Introduction',subject:'Quick question about {{company}}',body:'Hi {{first_name}},\n\n{{personalized_line}}\n\nI work with companies like {{company}} to help them [your value prop]. Thought this might be relevant.\n\nWould you be open to a 15-minute call?\n\nBest,\n{{sender_name}}'},
    {user_id:U.id,name:'Follow-Up #1',subject:'Re: Quick question about {{company}}',body:'Hi {{first_name}},\n\nJust following up — wanted to make sure my last email didn\'t get buried.\n\n[Value prop reiteration]\n\nWorth a quick chat?\n\n{{sender_name}}'},
    {user_id:U.id,name:'Break-Up Email',subject:'Closing the loop',body:'Hi {{first_name}},\n\nI\'ve reached out a couple of times but haven\'t heard back — I\'ll take that as a no for now.\n\nIf things change, feel free to reach out.\n\nAll the best,\n{{sender_name}}'}
  ]);
}
sb.auth.getSession().then(({data:{session}})=>{if(session?.user)onLogin(session.user);});
sb.auth.onAuthStateChange((_,session)=>{if(session?.user&&!U)onLogin(session.user);else if(!session&&U)logout();});

// ── Nav ───────────────────────────────────────────────────────────────────────
async function go(p){
  currentPage=p;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>{if(n.getAttribute('onclick')?.includes(`'${p}'`))n.classList.add('active');});
  const titles={dashboard:'Dashboard',campaigns:'Campaigns',prospects:'Prospects',workflows:'Workflows',templates:'Templates',inbox:'Inbox',accounts:'Email Accounts',apikeys:'API Keys',settings:'Settings'};
  document.getElementById('page-title').textContent=titles[p]||p;
  const ta=document.getElementById('topbar-actions');ta.innerHTML='';
  const el=document.getElementById('page-content');
  el.innerHTML='<div style="display:flex;justify-content:center;padding:60px"><div class="spinner" style="width:32px;height:32px;border-width:3px"></div></div>';
  const pages={dashboard:pgDashboard,campaigns:pgCampaigns,prospects:pgProspects,workflows:pgWorkflows,templates:pgTemplates,inbox:pgInbox,accounts:pgAccounts,apikeys:pgApiKeys,settings:pgSettings};
  if(pages[p])await pages[p](el,ta);
  // update badges
  const[{count:pc},{count:cc},{count:ic}]=await Promise.all([
    sb.from('prospects').select('*',{count:'exact',head:true}).eq('user_id',U.id),
    sb.from('campaigns').select('*',{count:'exact',head:true}).eq('user_id',U.id),
    sb.from('inbox').select('*',{count:'exact',head:true}).eq('user_id',U.id).eq('status','new')
  ]);
  document.getElementById('nb-p').textContent=pc||0;
  document.getElementById('nb-c').textContent=cc||0;
  document.getElementById('nb-i').textContent=ic||0;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function pgDashboard(el){
  const[{data:pros},{data:camps},{data:accs}]=await Promise.all([
    sb.from('prospects').select('emails_sent,status').eq('user_id',U.id),
    sb.from('campaigns').select('*').eq('user_id',U.id),
    sb.from('email_accounts').select('*').eq('user_id',U.id)
  ]);
  const sent=(pros||[]).reduce((s,p)=>s+(p.emails_sent||0),0);
  const replied=(pros||[]).filter(p=>p.status==='replied').length;
  const total=pros?.length||0;
  const rr=total?Math.round(replied/total*100):0;
  el.innerHTML=`
  <div class="grid4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-lbl">Prospects</div><div class="stat-val">${total}</div><div class="stat-sub">${camps?.length||0} campaigns</div></div>

    <div class="stat"><div class="stat-lbl">Reply Rate</div><div class="stat-val" style="color:var(--green)">${rr}%</div><div class="stat-sub">${replied} replies</div></div>
    <div class="stat"><div class="stat-lbl">Active Accounts</div><div class="stat-val">${(accs||[]).filter(a=>a.status==='active').length}<span style="font-size:14px;color:var(--text3)">/${accs?.length||0}</span></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="section-title">📬 Account Health</div>
      ${!(accs?.length)?`<div class="empty"><div class="ei">📭</div><h3>No accounts yet</h3><p>Go to Email Accounts to add Gmail</p></div>`:accs.map(a=>{const pct=Math.min(100,Math.round((a.sent_today||0)/a.daily_limit*100));const col=pct>90?'red':pct>70?'amber':'green';return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:500">${a.email}</span><span class="tag ${a.status==='active'?'green':'amber'}">${a.status}</span></div><div style="display:flex;align-items:center;gap:8px"><div class="pbw" style="flex:1"><div class="pb ${col}" style="width:${pct}%"></div></div><span style="font-size:11px;color:var(--text2)">${a.sent_today||0}/${a.daily_limit}/day</span></div></div>`;}).join('')}
    </div>
    <div class="card"><div class="section-title">🚀 Active Campaigns</div>
      ${!(camps?.length)?`<div class="empty"><div class="ei">🚀</div><h3>No campaigns yet</h3></div>`:camps.slice(0,5).map(c=>`<div style="margin-bottom:10px;padding:12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">${c.name}</span><span class="tag ${c.status==='active'?'green':c.status==='paused'?'amber':'gray'}">${c.status}</span></div></div>`).join('')}
    </div>
  </div>`;
}

function keyRow(k){return`<div class="key-row"><div style="font-size:18px">${k.is_active?'🟢':'🔴'}</div><div style="flex:1"><div style="font-size:12px;font-weight:500;margin-bottom:2px">${k.label||'Key'}</div><div class="key-val">${k.key_value.slice(0,10)}••••${k.key_value.slice(-4)}</div><div style="font-size:11px;color:var(--text3)">Used ${k.usage_count||0}×</div></div><button class="btn xs" onclick="toggleKey('${k.id}',${k.is_active})">${k.is_active?'Pause':'Enable'}</button><button class="btn xs danger" onclick="delKey('${k.id}')">✕</button></div>`;}
function addKey(svc){
  modal(`<div class="modal">

    <div class="fr"><label>Label (e.g. "Account 1")</label><input id="kl" placeholder="My Account 1"/></div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">

async function saveKey(svc){

  closeModal();toast('Key saved ✅','success');go('apikeys');
}
async function toggleKey(id,cur){await sb.from('api_keys').update({is_active:!cur}).eq('id',id);go('apikeys');}
async function delKey(id){if(!confirm('Delete key?'))return;await sb.from('api_keys').delete().eq('id',id);toast('Deleted','success');go('apikeys');}

function addAcct(){acctModal();}
async function editAcct(id){const{data}=await sb.from('email_accounts').select('*').eq('id',id).single();acctModal(data);}
async function saveAcct(id){
  const email=document.getElementById('ae').value.trim(),pass=document.getElementById('ap').value.trim(),name=document.getElementById('an').value.trim(),limit=parseInt(document.getElementById('al').value)||50,status=document.getElementById('as').value;
  if(!email||!pass){toast('Email and password required','error');return;}
  if(id){await sb.from('email_accounts').update({email,app_password:pass,display_name:name,daily_limit:limit,status}).eq('id',id);}
  else{await sb.from('email_accounts').insert({user_id:U.id,email,app_password:pass,display_name:name,daily_limit:limit,status,sent_today:0,total_sent:0});}
  closeModal();toast('Account saved','success');go('accounts');
}
async function testAcct(id){
  const{data:a}=await sb.from('email_accounts').select('*').eq('id',id).single();
  if(!a)return;
  toast('Testing SMTP connection...','info');
  try{
    const backend=await getBackend();
    if(!backend){toast('Set backend URL in Settings first','error');return;}
    const r=await fetch(`${backend}/test`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fromEmail:a.email,appPassword:a.app_password})});
    const d=await r.json();
    if(d.success)toast('✅ SMTP verified! Credentials work.','success');
    else toast('❌ '+d.error,'error');
  }catch(e){toast('Backend not reachable: '+e.message,'error');}
}
async function toggleAcct(id,s){await sb.from('email_accounts').update({status:s==='active'?'paused':'active'}).eq('id',id);go('accounts');}
async function resetAcct(id){await sb.from('email_accounts').update({sent_today:0}).eq('id',id);toast('Reset','success');go('accounts');}
async function delAcct(id){if(!confirm('Delete account?'))return;await sb.from('email_accounts').delete().eq('id',id);toast('Deleted','success');go('accounts');}

// ── Prospects ─────────────────────────────────────────────────────────────────
async function pgProspects(el,ta){
  ta.innerHTML=`<button class="btn" onclick="openUpload()">📤 Upload CSV/Excel</button><button class="btn" onclick="addProspect()">+ Add</button><button class="btn primary" onclick="researchAll()">🤖 Research All</button>`;
  await renderProspects(el);
}
async function renderProspects(el,filter={}){
  let q=sb.from('prospects').select('*').eq('user_id',U.id);
  if(filter.status)q=q.eq('status',filter.status);
  if(filter.q)q=q.or(`first_name.ilike.%${filter.q}%,last_name.ilike.%${filter.q}%,email.ilike.%${filter.q}%,company.ilike.%${filter.q}%`);
  const{data:pros}=await q.order('created_at',{ascending:false});
  const{data:accs}=await sb.from('email_accounts').select('id,email,sent_today,daily_limit').eq('user_id',U.id);
  const accMap=Object.fromEntries((accs||[]).map(a=>[a.id,a]));
  const sc={replied:'green','in sequence':'blue','not started':'gray',unsubscribed:'amber',completed:'purple'};
  el.innerHTML=`
  <div class="tb">
    <input class="search" placeholder="Search name, email, company..." oninput="searchPros(this.value)"/>
    <select onchange="filterPros(this.value)"><option value="">All Status</option><option>not started</option><option>in sequence</option><option>replied</option><option>unsubscribed</option><option>completed</option></select>
    <button class="btn sm danger" onclick="bulkDel()">🗑 Delete Selected</button>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th><input type="checkbox" onchange="document.querySelectorAll('.pcb').forEach(c=>c.checked=this.checked)"/></th>
      <th>Prospect</th><th>Company</th><th>Email</th><th>Account</th><th>Research</th><th>Personalized Line</th><th>Draft</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody id="ptb">${proRows(pros||[],accMap)}</tbody>
  </table></div>`;
}
function proRows(rows,accMap){
  if(!rows.length)return`<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:40px">No prospects. Upload a CSV or add manually.</td></tr>`;
  const sc={replied:'green','in sequence':'blue','not started':'gray',unsubscribed:'amber',completed:'purple'};
  return rows.map(p=>{
    const a=accMap?.[p.assigned_account_id];
    return`<tr>
      <td><input type="checkbox" class="pcb" value="${p.id}"/></td>
      <td><div style="font-weight:500">${p.first_name} ${p.last_name}</div><div style="font-size:11px;color:var(--text3)">${p.website||''}</div></td>
      <td>${p.company||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${p.email}</td>
      <td>${a?`<div style="font-size:12px">${a.email}</div><div style="font-size:10px;color:var(--text3)">${a.sent_today||0}/${a.daily_limit}/day</div>`:`<span style="font-size:12px;color:var(--text3)">Unassigned</span>`}</td>
      <td>${p.research_status==='done'?`<span class="tag green">✓ Done</span>`:p.research_status==='in progress'?`<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`:p.research_status==='failed'?`<span class="tag red">Failed</span>`:`<button class="btn xs" onclick="researchOne('${p.id}')">🤖 Research</button>`}</td>
      <td style="max-width:160px"><div style="font-size:12px;color:var(--text2);font-style:italic;overflow:hidden;max-height:36px">${p.personalized_line?`"${p.personalized_line.slice(0,70)}..."`:''}</div>${p.research_status==='done'?`<button class="btn xs" style="margin-top:3px" onclick="regenLine('${p.id}')">↻ Regen</button>`:''}</td>
      <td>${p.draft_email?`<button class="btn xs" onclick="previewEmail('${p.id}')">👁 Preview</button>`:`<span style="color:var(--text3);font-size:12px">—</span>`}</td>
      <td><span class="tag ${sc[p.status]||'gray'}">${p.status}</span></td>
      <td><div style="display:flex;gap:4px"><button class="btn xs" onclick="viewProspect('${p.id}')">View</button><button class="btn xs danger" onclick="delPros('${p.id}')">✕</button></div></td>
    </tr>`;
  }).join('');
}
async function searchPros(q){
  const{data:pros}=await sb.from('prospects').select('*').eq('user_id',U.id).or(`first_name.ilike.%${q}%,last_name.ilike.%${q}%,email.ilike.%${q}%,company.ilike.%${q}%`).order('created_at',{ascending:false});
  const{data:accs}=await sb.from('email_accounts').select('id,email,sent_today,daily_limit').eq('user_id',U.id);
  const accMap=Object.fromEntries((accs||[]).map(a=>[a.id,a]));
  document.getElementById('ptb').innerHTML=proRows(pros||[],accMap);
}
async function filterPros(s){
  let q=sb.from('prospects').select('*').eq('user_id',U.id);
  if(s)q=q.eq('status',s);
  const{data:pros}=await q.order('created_at',{ascending:false});
  const{data:accs}=await sb.from('email_accounts').select('id,email,sent_today,daily_limit').eq('user_id',U.id);
  const accMap=Object.fromEntries((accs||[]).map(a=>[a.id,a]));
  document.getElementById('ptb').innerHTML=proRows(pros||[],accMap);
}
async function bulkDel(){
  const ids=[...document.querySelectorAll('.pcb:checked')].map(c=>c.value);
  if(!ids.length){toast('Select prospects first','error');return;}
  if(!confirm(`Delete ${ids.length} prospects?`))return;
  await sb.from('prospects').delete().in('id',ids);
  toast(`Deleted ${ids.length}`,'success');go('prospects');
}
async function delPros(id){if(!confirm('Delete?'))return;await sb.from('prospects').delete().eq('id',id);go('prospects');}

async function bestAccount(){
  const{data:accs}=await sb.from('email_accounts').select('*').eq('user_id',U.id).eq('status','active');
  if(!accs?.length)return null;
  const avail=accs.filter(a=>(a.sent_today||0)<a.daily_limit);
  if(!avail.length)return accs[0].id;
  avail.sort((a,b)=>(b.daily_limit-(b.sent_today||0))-(a.daily_limit-(a.sent_today||0)));
  return avail[0].id;
}

function openUpload(){
  sb.from('campaigns').select('id,name').eq('user_id',U.id).then(({data:camps})=>{
    modal(`<div class="modal">
      <div class="modal-hdr">📤 Upload Prospects <button class="xbtn" onclick="closeModal()">✕</button></div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Upload CSV or Excel. Columns auto-detected: First Name, Last Name, Email, Company, Website, Phone, Industry, Location, Google Business URL.</p>
      <div class="fr"><label>File (.csv or .xlsx)</label><input type="file" id="uf" accept=".csv,.xlsx,.xls"/></div>
      <div class="fr"><label>Assign to Campaign (optional)</label><select id="uc"><option value="">None</option>${(camps||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="doUpload()">Import</button>
      </div>
    </div>`);
  });
}
async function doUpload(){
  const file=document.getElementById('uf').files[0];
  const cid=document.getElementById('uc').value;
  if(!file){toast('Select a file','error');return;}
  const btn=event.target;btn.disabled=true;btn.innerHTML='Importing... <div class="spinner"></div>';
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      let rows=[];
      if(file.name.endsWith('.csv')){
        const lines=e.target.result.split('\n').filter(l=>l.trim());
        const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
        rows=lines.slice(1).map(line=>{const cols=line.split(',');const obj={};headers.forEach((h,i)=>obj[h]=(cols[i]||'').trim());return obj;});
      }else{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{defval:''}).map(r=>{const obj={};Object.keys(r).forEach(k=>obj[k.toLowerCase().replace(/[^a-z0-9]/g,'')]=String(r[k]).trim());return obj;});
      }
      const accountId=await bestAccount();
      const{data:existing}=await sb.from('prospects').select('email').eq('user_id',U.id);
      const ex=new Set((existing||[]).map(p=>p.email));
      const ins=[];
      rows.forEach(r=>{
        const email=r.email||r.emailaddress||r.emailaddr||'';
        if(!email||ex.has(email))return;
        ins.push({user_id:U.id,campaign_id:cid||null,assigned_account_id:accountId,first_name:r.firstname||r.first||r.fname||'',last_name:r.lastname||r.last||r.lname||'',email,company:r.company||r.companyname||'',website:r.website||r.websiteurl||r.url||'',phone:r.phone||'',industry:r.industry||'',location:r.location||r.city||'',gbp_url:r.googlebusiness||r.gbp||r.gbpurl||'',status:'not started',research_status:'pending'});
        ex.add(email);
      });
      for(let i=0;i<ins.length;i+=100)await sb.from('prospects').insert(ins.slice(i,i+100));
      closeModal();toast(`✅ Imported ${ins.length} prospects`,'success');go('prospects');
    }catch(err){toast('Error: '+err.message,'error');btn.disabled=false;btn.innerHTML='Import';}
  };
  if(file.name.endsWith('.csv'))reader.readAsText(file);else reader.readAsBinaryString(file);
}

async function getApiKeys(){
  const{data}=await sb.from('api_keys').select('*').eq('user_id',U.id).eq('is_active',true).order('usage_count',{ascending:true});
  const fc=(data||[]).filter(k=>k.service==='firecrawl').map(k=>k.key_value);
  const gr=(data||[]).filter(k=>k.service==='groq').map(k=>k.key_value);
  return{fc,gr};
}
async function researchOne(id){
  const{data:p}=await sb.from('prospects').select('*').eq('id',id).single();
  if(!p)return;
  await sb.from('prospects').update({research_status:'in progress'}).eq('id',id);
  // Optimistically update UI
  const row=document.querySelector(`input.pcb[value="${id}"]`)?.closest('tr');
  if(row){const cells=[...row.cells];if(cells[5])cells[5].innerHTML=`<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;}
  try{
    const backend=await getBackend();
    if(!backend)throw new Error('Backend URL not set. Go to Settings and add your Railway URL.');
    const{fc,gr}=await getApiKeys();
    if(!gr.length)throw new Error('No Groq keys added. Go to API Keys → add free keys from console.groq.com');
    const{data:tmpl}=await sb.from('templates').select('*').eq('user_id',U.id).order('created_at').limit(1).single();
    const resp=await fetch(`${backend}/research`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prospect:{first_name:p.first_name,last_name:p.last_name,company:p.company,website:p.website,gbp_url:p.gbp_url,industry:p.industry,location:p.location},firecrawlKeys:fc,groqKeys:gr,templateBody:tmpl?.body||'',templateSubject:tmpl?.subject||''})
    });
    const d=await resp.json();
    if(!d.success)throw new Error(d.error||'Research failed');
    // Update usage counts in DB
    const{data:keys}=await sb.from('api_keys').select('*').eq('user_id',U.id).eq('is_active',true);
    for(const k of(keys||[])){if(k.service==='groq')await sb.from('api_keys').update({usage_count:(k.usage_count||0)+1,last_used_at:new Date().toISOString()}).eq('id',k.id).limit(1);}
    await sb.from('prospects').update({research_status:'done',research_data:d.research,personalized_line:d.research?.personalizedLine||'',draft_email:d.draftEmail||'',draft_subject:d.draftSubject||''}).eq('id',id);
    toast(`✅ Research done: ${p.first_name} ${p.last_name}`,'success');
  }catch(err){
    await sb.from('prospects').update({research_status:'failed'}).eq('id',id);
    toast(`Research failed: ${err.message}`,'error');
  }
  if(currentPage==='prospects')go('prospects');
}

async function openWfModal(editId){
  const{data:tmpl}=await sb.from('templates').select('id,name').eq('user_id',U.id);
  const topts=(tmpl||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  let steps=[],name='';
  if(editId){const{data:w}=await sb.from('workflows').select('*').eq('id',editId).single();steps=w?.steps||[];name=w?.name||'';}
  else{
    const fid=tmpl?.[0]?.id||'';
    steps=[{id:uid(),type:'email',templateId:fid,includePersonalizedLine:true},{id:uid(),type:'condition_reply'},{id:uid(),type:'wait',days:3},{id:uid(),type:'email',templateId:tmpl?.[1]?.id||fid,includePersonalizedLine:false},{id:uid(),type:'condition_reply'},{id:uid(),type:'wait',days:4},{id:uid(),type:'email',templateId:tmpl?.[2]?.id||fid,includePersonalizedLine:false},{id:uid(),type:'stop'}];
  }
  window._ws=[...steps];
  const stypes=[{v:'email',l:'📧 Send Email'},{v:'wait',l:'⏰ Wait N Days'},{v:'condition_reply',l:'🔁 Stop if Replied'},{v:'condition_unsub',l:'🚫 Stop if Unsubscribed'},{v:'condition_open',l:'👁 Only if Opened'},{v:'tag',l:'🏷 Apply Tag'},{v:'stop',l:'🛑 End Sequence'}];
  function rsw(ss){
    return ss.map((s,i)=>`<div class="wf-step"><div class="wf-num">${i+1}</div><div style="flex:1">
      <select onchange="wsct('${s.id}',this.value)" style="width:auto;min-width:180px;margin-bottom:8px">${stypes.map(t=>`<option value="${t.v}" ${s.type===t.v?'selected':''}>${t.l}</option>`).join('')}</select>
      ${s.type==='email'?`<div class="fr"><label>Template</label><select onchange="wsu('${s.id}','templateId',this.value)">${topts.replace(`value="${s.templateId}"`,`value="${s.templateId}" selected`)}</select></div><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><label class="sw"><input type="checkbox" ${s.includePersonalizedLine?'checked':''} onchange="wsu('${s.id}','includePersonalizedLine',this.checked)"><div class="sw-sl"></div></label>Include AI personalized line</label>`:''}
      ${s.type==='wait'?`<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><label style="margin:0;white-space:nowrap;min-width:80px">Wait days:</label><input type="number" min="1" max="365" value="${s.days||3}" style="width:80px" onchange="wsu('${s.id}','days',+this.value)"/></div>`:''}
      ${s.type==='tag'?`<input value="${s.tag||''}" placeholder="Tag name" style="margin-top:4px" onchange="wsu('${s.id}','tag',this.value)"/>`:''}
    </div><button class="btn xs danger" onclick="wsr('${s.id}')">✕</button></div>`).join('<div style="display:flex;justify-content:center"><div style="width:2px;height:8px;background:var(--border2)"></div></div>');
  }
  window._wfR=rsw;
  modal(`<div class="modal wide">
    <div class="modal-hdr">${editId?'Edit':'New'} Workflow <button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fr"><label>Workflow Name</label><input id="wfn" value="${name}" placeholder="e.g. 3-Step Cold Outreach"/></div>
    <div class="section-title">Sequence Steps</div>
    <div id="wfsteps">${rsw(window._ws)}</div>
    <button class="btn" style="width:100%;margin-top:8px;justify-content:center" onclick="wsa()">+ Add Step</button>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveWf('${editId||''}')">Save Workflow</button>
    </div>
  </div>`);
}
window.wsct=function(id,t){window._ws=window._ws.map(s=>s.id===id?{...s,type:t}:s);document.getElementById('wfsteps').innerHTML=window._wfR(window._ws);};
window.wsu=function(id,k,v){window._ws=window._ws.map(s=>s.id===id?{...s,[k]:v}:s);};

function tmplModal(t){
  t=t||{};
  modal(`<div class="modal wide">
    <div class="modal-hdr">${t.id?'Edit':'New'} Template <button class="xbtn" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:12px">${['{{first_name}}','{{last_name}}','{{company}}','{{personalized_line}}','{{sender_name}}','{{sender_email}}','{{unsubscribe_link}}'].map(v=>`<span class="vc" onclick="insertV('${v}')">${v}</span>`).join('')}</div>
    <div class="fr"><label>Template Name</label><input id="tn" value="${t.name||''}" placeholder="e.g. Cold Introduction"/></div>
    <div class="fr"><label>Subject Line</label><input id="ts" value="${t.subject||''}" placeholder="Quick question about {{company}}"/></div>
    <div class="fr"><label>Email Body</label><textarea id="tb" rows="12" style="font-family:'DM Mono',monospace;font-size:12px;line-height:1.6">${t.body||''}</textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveTmpl('${t.id||''}')">Save Template</button>
    </div>
  </div>`);
}
window.insertV=function(v){const tb=document.getElementById('tb');if(!tb)return;const s=tb.selectionStart;tb.value=tb.value.slice(0,s)+v+tb.value.slice(tb.selectionEnd);tb.focus();tb.setSelectionRange(s+v.length,s+v.length);};
async function saveTmpl(id){
  const n=document.getElementById('tn').value.trim(),s=document.getElementById('ts').value.trim(),b=document.getElementById('tb').value.trim();
  if(!n||!s||!b){toast('All fields required','error');return;}
  if(id)await sb.from('templates').update({name:n,subject:s,body:b,updated_at:new Date().toISOString()}).eq('id',id);
  else await sb.from('templates').insert({user_id:U.id,name:n,subject:s,body:b});
  closeModal();toast('Saved','success');go('templates');
}
async function delTemplate(id){if(!confirm('Delete?'))return;await sb.from('templates').delete().eq('id',id);go('templates');}

// ── Campaigns ─────────────────────────────────────────────────────────────────
async function pgCampaigns(el,ta){
  ta.innerHTML=`<button class="btn primary" onclick="addCampaign()">+ New Campaign</button>`;
  const[{data:camps},{data:pros},{data:wfs}]=await Promise.all([
    sb.from('campaigns').select('*').eq('user_id',U.id).order('created_at',{ascending:false}),
    sb.from('prospects').select('campaign_id,status,emails_sent').eq('user_id',U.id),
    sb.from('workflows').select('id,name').eq('user_id',U.id)
  ]);
  if(!camps?.length){el.innerHTML=`<div class="empty"><div class="ei">🚀</div><h3>No campaigns</h3><p>Create a campaign to start sending</p><br><button class="btn primary" onclick="addCampaign()">+ Create Campaign</button></div>`;return;}
  const wmap=Object.fromEntries((wfs||[]).map(w=>[w.id,w.name]));
  const sc={active:'green',paused:'amber',draft:'gray',completed:'purple'};
  el.innerHTML=camps.map(c=>{
    const cp=(pros||[]).filter(p=>p.campaign_id===c.id);
    const sent=cp.filter(p=>p.emails_sent>0).length;
    const replied=cp.filter(p=>p.status==='replied').length;
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div><div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:600">${c.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Workflow: ${wmap[c.workflow_id]||'None'} · Start: ${c.start_date||'Not set'} · ${c.send_days==='all'?'All days':'Mon–Fri'} · ${c.send_window}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="tag ${sc[c.status]||'gray'}">${c.status}</span>
          <button class="btn sm" onclick="editCampaign('${c.id}')">Edit</button>
          <button class="btn sm ${c.status==='active'?'':'primary'}" onclick="toggleCamp('${c.id}','${c.status}')">${c.status==='active'?'⏸ Pause':'▶ Launch'}</button>
          <button class="btn sm danger" onclick="delCamp('${c.id}')">Delete</button>
        </div>
      </div>
      <div class="grid4">
        <div class="stat" style="padding:12px"><div class="stat-lbl">Prospects</div><div class="stat-val" style="font-size:22px">${cp.length}</div></div>
        <div class="stat" style="padding:12px"><div class="stat-lbl">Contacted</div><div class="stat-val" style="font-size:22px">${sent}</div></div>
        <div class="stat" style="padding:12px"><div class="stat-lbl">Replies</div><div class="stat-val" style="font-size:22px;color:var(--green)">${replied}</div></div>
        <div class="stat" style="padding:12px"><div class="stat-lbl">Reply Rate</div><div class="stat-val" style="font-size:22px">${cp.length?Math.round(replied/cp.length*100):0}%</div></div>
      </div>
      ${c.status==='draft'?`<div class="banner warn" style="margin-top:12px;margin-bottom:0;font-size:12px">⚠️ Draft mode — click Launch to activate sending</div>`:''}
    </div>`;
  }).join('');
}
async function addCampaign(){campModal();}
async function editCampaign(id){const{data}=await sb.from('campaigns').select('*').eq('id',id).single();campModal(data);}
async function campModal(c){
  c=c||{};
  const{data:wfs}=await sb.from('workflows').select('id,name').eq('user_id',U.id);
  modal(`<div class="modal">
    <div class="modal-hdr">${c.id?'Edit':'New'} Campaign <button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fr"><label>Campaign Name</label><input id="cn" value="${c.name||''}" placeholder="SaaS Founders — June 2025"/></div>
    <div class="fr"><label>Workflow</label><select id="cw"><option value="">None</option>${(wfs||[]).map(w=>`<option value="${w.id}" ${c.workflow_id===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div>
    <div class="fr row">
      <div><label>Start Date</label><input id="cd" type="date" value="${c.start_date||''}"/></div>
      <div><label>Send Window</label><select id="cwin"><option value="9-17" ${c.send_window==='9-17'||!c.send_window?'selected':''}>9am–5pm</option><option value="8-18" ${c.send_window==='8-18'?'selected':''}>8am–6pm</option><option value="anytime" ${c.send_window==='anytime'?'selected':''}>Anytime</option></select></div>
    </div>
    <div class="fr"><label>Send Days</label><select id="cdays"><option value="weekdays" ${c.send_days!=='all'?'selected':''}>Mon–Fri only</option><option value="all" ${c.send_days==='all'?'selected':''}>All 7 days</option></select></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveCamp('${c.id||''}')">Save Campaign</button>
    </div>
  </div>`);
}
async function saveCamp(id){
  const n=document.getElementById('cn').value.trim();
  if(!n){toast('Name required','error');return;}
  const d={name:n,workflow_id:document.getElementById('cw').value||null,start_date:document.getElementById('cd').value||null,send_window:document.getElementById('cwin').value,send_days:document.getElementById('cdays').value,updated_at:new Date().toISOString()};
  if(id)await sb.from('campaigns').update(d).eq('id',id);
  else await sb.from('campaigns').insert({...d,user_id:U.id,status:'draft'});
  closeModal();toast('Saved','success');go('campaigns');
}
async function toggleCamp(id,s){
  const ns=s==='active'?'paused':'active';
  await sb.from('campaigns').update({status:ns}).eq('id',id);
  toast(ns==='active'?'🚀 Campaign launched!':'⏸ Campaign paused',ns==='active'?'success':'info');
  go('campaigns');
}
async function delCamp(id){if(!confirm('Delete campaign?'))return;await sb.from('campaigns').delete().eq('id',id);go('campaigns');}

// ── Inbox ─────────────────────────────────────────────────────────────────────
async function pgInbox(el,ta){
  ta.innerHTML=`<button class="btn primary" onclick="logReply()">+ Log Reply</button>`;
  const{data:inbox}=await sb.from('inbox').select('*').eq('user_id',U.id).order('received_at',{ascending:false});
  if(!inbox?.length){el.innerHTML=`<div class="empty"><div class="ei">📥</div><h3>Inbox empty</h3><p>Log replies manually here. Each logged reply automatically halts that prospect's sequence.</p></div>`;return;}
  const sc={Interested:'green','Not Interested':'red','Needs Follow Up':'amber','Booked Meeting':'purple',new:'blue'};
  const stats=['Interested','Not Interested','Needs Follow Up','Booked Meeting'];
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"><button class="btn sm" onclick="filterInbox('all')">All</button>${stats.map(s=>`<button class="btn sm" onclick="filterInbox('${s}')">${s}</button>`).join('')}</div>
  <div id="ilist">${(inbox||[]).map(item=>`<div class="inbox-item"><div class="iav">${(item.from_name||item.from_email||'?')[0].toUpperCase()}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:500">${item.from_name||item.from_email}</div><div style="font-size:12px;color:var(--text3)">${item.from_email}</div></div><div style="display:flex;gap:6px;align-items:center"><span class="tag ${sc[item.status]||'blue'}">${item.status}</span><span style="font-size:11px;color:var(--text3)">${new Date(item.received_at).toLocaleDateString('en-GB')}</span></div></div><div style="font-size:12px;color:var(--text2);margin-top:6px">${item.preview||''}</div><div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">${stats.map(s=>`<button class="btn xs" onclick="setIS('${item.id}','${s}')">${s}</button>`).join('')}</div></div></div>`).join('')}</div>`;
}
async function filterInbox(s){
  let q=sb.from('inbox').select('*').eq('user_id',U.id);
  if(s!=='all')q=q.eq('status',s);
  const{data}=await q.order('received_at',{ascending:false});
  const sc={Interested:'green','Not Interested':'red','Needs Follow Up':'amber','Booked Meeting':'purple',new:'blue'};
  const stats=['Interested','Not Interested','Needs Follow Up','Booked Meeting'];
  document.getElementById('ilist').innerHTML=(data||[]).map(item=>`<div class="inbox-item"><div class="iav">${(item.from_name||'?')[0].toUpperCase()}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><div style="font-weight:500">${item.from_name||item.from_email}</div><span class="tag ${sc[item.status]||'blue'}">${item.status}</span></div><div style="font-size:12px;color:var(--text2)">${item.preview||''}</div><div style="margin-top:6px;display:flex;gap:4px">${stats.map(s=>`<button class="btn xs" onclick="setIS('${item.id}','${s}')">${s}</button>`).join('')}</div></div></div>`).join('');
}
async function setIS(id,s){await sb.from('inbox').update({status:s}).eq('id',id);go('inbox');}
function logReply(){
  modal(`<div class="modal">
    <div class="modal-hdr">Log a Reply <button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fr"><label>From Email *</label><input id="re" placeholder="prospect@company.com"/></div>
    <div class="fr"><label>From Name</label><input id="rn" placeholder="Jane Smith"/></div>
    <div class="fr"><label>Reply / Notes</label><textarea id="rb" rows="4" placeholder="Paste or summarize the reply..."></textarea></div>
    <div class="fr"><label>Status</label><select id="rs"><option>Interested</option><option>Not Interested</option><option>Needs Follow Up</option><option>Booked Meeting</option></select></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveReply()">Save Reply</button>
    </div>
  </div>`);
}
async function saveReply(){
  const email=document.getElementById('re').value.trim();
  if(!email){toast('Email required','error');return;}
  const body=document.getElementById('rb').value.trim();
  await sb.from('inbox').insert({user_id:U.id,from_email:email,from_name:document.getElementById('rn').value.trim(),body,preview:body.slice(0,120),status:document.getElementById('rs').value,received_at:new Date().toISOString()});
  await sb.from('prospects').update({status:'replied'}).eq('user_id',U.id).eq('email',email);
  closeModal();toast('Reply logged — prospect sequence halted ✅','success');go('inbox');
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function pgSettings(el){
  const{data:s}=await sb.from('settings').select('*').eq('id',U.id).single();
  const c=s||{};
  el.innerHTML=`
  <div class="banner info" style="margin-bottom:20px">
    <strong>🚂 Railway Backend URL</strong> — After deploying your backend to Railway, paste the URL below. Format: <code style="background:var(--bg4);padding:2px 6px;border-radius:4px">https://your-app.up.railway.app</code>
  </div>
  <div class="grid2">
    <div>
      <div class="card">
        <div class="section-title">⚙️ General</div>
        <div class="fr"><label>Backend URL (Railway)</label><input id="sbu" value="${c.backend_url||''}" placeholder="https://your-app.up.railway.app"/></div>
        <div class="fr"><label>Default Sender Name</label><input id="ssn" value="${c.sender_name||''}" placeholder="John Smith"/></div>
        <div class="fr"><label>Default Reply-To Email</label><input id="srt" value="${c.reply_to||''}" placeholder="replies@yourdomain.com"/></div>
        <div class="fr"><label>Global Daily Send Cap</label><input id="sgc" type="number" value="${c.global_daily_cap||500}"/></div>
        <div class="fr"><label>Timezone</label><select id="stz">
          <option value="Europe/London" ${c.timezone==='Europe/London'||!c.timezone?'selected':''}>Europe/London (GMT+1)</option>
          <option value="America/New_York" ${c.timezone==='America/New_York'?'selected':''}>America/New_York (ET)</option>
          <option value="America/Chicago" ${c.timezone==='America/Chicago'?'selected':''}>America/Chicago (CT)</option>
          <option value="America/Los_Angeles" ${c.timezone==='America/Los_Angeles'?'selected':''}>America/Los_Angeles (PT)</option>
          <option value="UTC" ${c.timezone==='UTC'?'selected':''}>UTC</option>
        </select></div>
        <button class="btn primary" onclick="saveSettings()">Save Settings</button>
        <button class="btn" style="margin-left:8px" onclick="testBackend()">Test Backend Connection</button>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="section-title">🚫 Global Unsubscribe List</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Emails here are permanently excluded from all campaigns</div>
        <textarea id="sus" rows="5" placeholder="one@email.com&#10;two@email.com" style="font-family:'DM Mono',monospace;font-size:12px">${(c.unsub_list||[]).join('\n')}</textarea>
        <button class="btn sm" style="margin-top:8px" onclick="saveUnsub()">Save Unsubscribe List</button>
      </div>
      <div class="card">
        <div class="section-title">⛔ Domain Blacklist</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Never email anyone at these domains</div>
        <textarea id="sbl" rows="4" placeholder="competitor.com&#10;donotemail.com" style="font-family:'DM Mono',monospace;font-size:12px">${(c.blacklist_domains||[]).join('\n')}</textarea>
        <button class="btn sm" style="margin-top:8px" onclick="saveBlacklist()">Save Blacklist</button>
      </div>
    </div>
  </div>`;
}
async function saveSettings(){
  await sb.from('settings').upsert({id:U.id,backend_url:document.getElementById('sbu').value.trim().replace(/\/$/,''),sender_name:document.getElementById('ssn').value.trim(),reply_to:document.getElementById('srt').value.trim(),global_daily_cap:parseInt(document.getElementById('sgc').value)||500,timezone:document.getElementById('stz').value,updated_at:new Date().toISOString()});
  toast('Settings saved ✅','success');
}
async function testBackend(){
  const url=document.getElementById('sbu').value.trim().replace(/\/$/,'');
  if(!url){toast('Enter backend URL first','error');return;}
  toast('Testing connection...','info');
  try{const r=await fetch(`${url}/`,{signal:AbortSignal.timeout(8000)});const d=await r.json();if(d.status==='ok')toast(`✅ Connected! Backend v${d.version} is running`,'success');else toast('Backend responded but unexpected format','error');}
  catch(e){toast('❌ Could not reach backend: '+e.message,'error');}
}
async function saveUnsub(){const l=document.getElementById('sus').value.split('\n').map(x=>x.trim()).filter(Boolean);await sb.from('settings').upsert({id:U.id,unsub_list:l,updated_at:new Date().toISOString()});toast('Saved','success');}
async function saveBlacklist(){const l=document.getElementById('sbl').value.split('\n').map(x=>x.trim()).filter(Boolean);await sb.from('settings').upsert({id:U.id,blacklist_domains:l,updated_at:new Date().toISOString()});toast('Saved','success');}
</script>
</body>
</html>
